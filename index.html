<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Feelm 콘텐츠사업본부 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --bg:#F5F5F3; --surface:#FFF; --surface2:#F8F8F6; --surface3:#EFEFED;
  --border:#E6E6E2; --border2:#D0D0CA;
  --ink:#1A1A1A; --ink2:#555552; --ink3:#9A9A96;
  --accent:#FDE200; --accent-dim:#FFFAE0; --accent-text:#1A1600;
  --good:#1E7A38; --good-dim:#E8F5EC;
  --warn:#9A6210; --warn-dim:#FEF3E0;
  --bad:#B02020;  --bad-dim:#FCEAEA;
  --info:#1A528A; --info-dim:#E6F0FA;
  --dark-bg:#0F172A; --dark-surf:#1E293B; --dark-border:#334155;
  --r:12px; --r2:8px; --r3:6px; --r4:4px;
  --sh-sm:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --sh-md:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06);
  --sh-lg:0 8px 24px rgba(0,0,0,.12),0 24px 48px rgba(0,0,0,.08);
  --sans:'Pretendard',-apple-system,sans-serif;
  --hdr-h:56px; --pill-h:68px; --tab-h:44px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* LOCK */
#lock{position:fixed;inset:0;z-index:999;background:var(--dark-bg);display:flex;align-items:center;justify-content:center}
#lock.hidden{display:none}
.lk-wrap{display:flex;flex-direction:column;align-items:center;gap:28px}
.lk-logo{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:800;color:#fff;letter-spacing:.1em;text-transform:uppercase}
.lk-logo-dot{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.lk-card{background:var(--dark-surf);border:1px solid var(--dark-border);border-radius:20px;padding:44px 48px;width:400px;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.lk-title{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1.2}
.lk-sub{font-size:12px;color:#666;margin-top:-4px}
.lk-inp{background:#1C1C1C;border:1.5px solid #333;border-radius:var(--r2);padding:13px 15px;font-size:15px;color:#fff;font-family:var(--sans);outline:none;transition:border-color .15s;letter-spacing:.06em}
.lk-inp:focus{border-color:var(--accent)}
.lk-inp::placeholder{color:#444;letter-spacing:0}
.lk-btn{background:var(--accent);border:none;border-radius:var(--r2);padding:14px;font-size:14px;font-weight:800;color:#111;cursor:pointer;font-family:var(--sans)}
.lk-btn:hover{opacity:.88}
.lk-err{font-size:12px;color:#ff6b6b;display:none;font-weight:600;text-align:center}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
#app.show{display:flex}

/* HEADER */
header{position:sticky;top:0;z-index:100;height:var(--hdr-h);background:rgba(245,245,243,.95);backdrop-filter:blur(16px) saturate(180%);border-bottom:1px solid var(--border)}
.hdr{display:flex;align-items:center;gap:16px;height:100%;padding:0 24px}
.brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.brand-mark{display:flex;align-items:center;}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:14px}
.sync-st{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);font-weight:500}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex-shrink:0}
.sync-dot.loading{background:var(--warn);animation:blink .8s linear infinite}
.sync-dot.error{background:var(--bad)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mpick{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2)}
.mpick input{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:5px 9px;color:var(--ink);font-family:var(--sans);font-size:12px;outline:none;cursor:pointer}
.mpick input:focus{border-color:var(--accent)}

/* TABS */
.tabs-bar{position:sticky;top:var(--hdr-h);z-index:99;height:var(--tab-h);background:rgba(245,245,243,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;overflow-x:auto;gap:0}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{border:none;background:none;color:var(--ink3);padding:0 16px;height:44px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab-btn:hover:not(.active){color:var(--ink)}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:900}
.tab-div{width:1px;height:18px;background:var(--border);margin:0 6px;flex-shrink:0}

/* PILL BAR */
.pill-bar-wrap{background:var(--dark-bg);border-bottom:1px solid var(--dark-border);width:100%}
.pill-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;height:160px}
.pill{display:flex;flex-direction:column;justify-content:space-between;padding:20px 32px;border-right:1px solid var(--dark-border);cursor:default;position:relative}
.pill:last-child{border-right:none}
.pill-lbl{font-size:13px;color:var(--accent);font-weight:800;letter-spacing:.06em;text-transform:uppercase;opacity:.9}
.pill-val{font-size:72px;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1;text-align:right;margin-top:auto}
.pill-val.up{color:var(--accent)}
.pill-val.ok{color:#4ADE80}
.pill-val.dn{color:#FF6B6B}
.pill-sub{font-size:14px;color:#888;text-align:right;margin-top:8px;letter-spacing:.01em}

/* MAIN */
main{flex:1;padding:18px 24px 80px;width:100%;box-sizing:border-box}
.section{display:none}
.section.active{display:block}
.gap{margin-top:12px}
.gap2{margin-top:18px}

/* GRID */
.g2{display:grid;grid-template-columns:1.5fr 1fr;gap:12px}
.g2e{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;box-shadow:var(--sh-sm)}
.card-title{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:.01em}
.card-title small{font-size:12px;color:var(--ink3);font-weight:400}

/* KPI */
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;box-shadow:var(--sh-sm);transition:border-color .15s}
.kpi:hover{border-color:var(--accent)}
.kpi-lbl{font-size:13px;color:var(--ink3);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.kpi-val{font-size:38px;font-weight:900;color:var(--ink);letter-spacing:-.04em;line-height:1;margin-bottom:6px}
.kpi-val.good{color:var(--good)}
.kpi-val.bad{color:var(--bad)}
.kpi-val.warn{color:var(--warn)}
.kpi-sub{font-size:13px;color:var(--ink3);line-height:1.5}
.kpi-bar-wrap{margin-top:10px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.kpi-bar{height:100%;border-radius:2px;background:var(--accent);transition:width .6s ease}

/* BAR CHART */
.chart-wrap{position:relative;height:200px;display:flex;align-items:flex-end;gap:5px;padding-bottom:26px;border-bottom:1px solid var(--border)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.bar-rect{width:100%;border-radius:3px 3px 0 0;transition:height .5s cubic-bezier(.34,1.56,.64,1);min-height:3px;cursor:default;position:relative}
.bar-rect:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;padding:5px 10px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:10;box-shadow:var(--sh-md)}
.bar-lbl{font-size:11px;color:var(--ink3);font-family:var(--sans);text-align:center;white-space:nowrap;overflow:hidden;max-width:100%}
.bar-val{font-size:10px;color:var(--ink2);font-weight:700;font-family:var(--sans);margin-bottom:2px;white-space:nowrap}
.b-y{background:var(--accent)}
.b-g{background:var(--good)}
.b-b{background:var(--info)}
.b-w{background:var(--warn)}
.b-r{background:var(--bad)}
.b-d{background:var(--ink3)}
.b-t{background:#8B5CF6}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:800;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;background:var(--surface2);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:var(--surface3)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:14px;color:var(--ink)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.right{text-align:right;font-variant-numeric:tabular-nums}
.empty-row{padding:32px 10px;text-align:center;color:var(--ink3);font-size:13px;font-style:italic}
.sort-icon{font-size:10px;color:var(--ink3);margin-left:3px}
.sort-icon.asc::after{content:'↑';color:var(--accent)}
.sort-icon.desc::after{content:'↓';color:var(--accent)}
.sort-icon:not(.asc):not(.desc)::after{content:'↕'}

/* BADGE */
.badge{display:inline-flex;align-items:center;border-radius:var(--r4);padding:3px 9px;font-size:11px;font-weight:800;letter-spacing:.03em;white-space:nowrap}
.badge.good{background:var(--good-dim);color:var(--good)}
.badge.bad{background:var(--bad-dim);color:var(--bad)}
.badge.warn{background:var(--warn-dim);color:var(--warn)}
.badge.info{background:var(--info-dim);color:var(--info)}
.badge.neutral{background:var(--surface3);color:var(--ink2)}
.badge.acc{background:var(--accent-dim);color:var(--accent-text)}

/* PROGRESS */
.prog-item{margin-bottom:12px}
.prog-item:last-child{margin-bottom:0}
.prog-head{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
.prog-head b{color:var(--ink);font-weight:700}
.prog-head span{color:var(--ink3);font-variant-numeric:tabular-nums}
.prog-bg{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* NOTICE */
.notice-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;height:100%}
.notice{border-radius:10px;padding:20px 22px;border:none;border-left:4px solid #E5E7EB;display:flex;flex-direction:column;justify-content:center;gap:6px;height:100%;box-sizing:border-box;background:#FAFAFA}
.notice .notice-icon{display:none}
.notice .n-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9CA3AF}
.notice .n-val{font-size:42px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--ink)}
.notice .n-sub{font-size:13px;color:#9CA3AF;margin-top:2px}
.notice.warn .n-val{color:#F59E0B}
.notice.bad .n-val{color:#EF4444}
.notice.good .n-val{color:#10B981}
.notice.info .n-val{color:#6366F1}
.notice.warn{border-left-color:#F59E0B}
.notice.bad{border-left-color:#EF4444}
.notice.good{border-left-color:#10B981}
.notice.info{border-left-color:#6366F1}
.notice.warn{background:#fff;border-top-color:#E5E7EB;color:var(--ink1)}
.notice.bad{background:#fff;border-top-color:#E5E7EB;color:var(--ink1)}
.notice.good{background:#fff;border-top-color:#E5E7EB;color:var(--ink1)}
.notice.info{background:#fff;border-top-color:#E5E7EB;color:var(--ink1)}
.notice .notice-icon{color:var(--ink3)}
.notice .hi-warn{color:var(--warn);font-weight:700}
.notice .hi-good{color:var(--good);font-weight:700}
.notice .hi-bad{color:var(--bad);font-weight:700}

/* TOOLBAR */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2)}
.toolbar-l,.toolbar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tb-lbl{font-size:11px;color:var(--ink2);font-weight:800;letter-spacing:.04em;white-space:nowrap}
.chip{border:1px solid var(--border2);background:var(--surface);color:var(--ink2);border-radius:999px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.chip:hover{border-color:var(--accent);color:var(--ink)}
.chip.active{background:var(--accent);border-color:var(--accent);color:var(--accent-text);font-weight:900}
.srch{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:6px 11px;color:var(--ink);font-family:var(--sans);font-size:13px;outline:none;min-width:160px;transition:border-color .15s}
.srch:focus{border-color:var(--accent)}
.sel{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:6px 11px;color:var(--ink);font-family:var(--sans);font-size:13px;outline:none;cursor:pointer}

/* SECTION DIVIDER */
.sec-label{font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;display:none;backdrop-filter:blur(3px)}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:-620px;width:580px;height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--sh-lg);z-index:160;overflow-y:auto;transition:right .28s cubic-bezier(.22,.68,0,1.2);padding:22px}
.drawer.open{right:0}
.drawer-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.drawer-close{border:none;background:var(--surface3);border-radius:50%;width:30px;height:30px;color:var(--ink2);font-size:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drawer-close:hover{background:var(--bad-dim);color:var(--bad)}
.drawer-cover{height:120px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:rgba(255,255,255,.9);text-align:center;padding:16px;margin-bottom:14px}
.sim-lbl{font-size:10px;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.sim-inp{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r3);padding:7px 10px;color:var(--ink);font-family:var(--sans);font-size:13px;width:100%;outline:none;transition:border-color .15s}
.sim-inp:focus{border-color:var(--accent)}

/* STACKED BAR */
.stacked-wrap{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.stacked-row{display:flex;align-items:center;gap:10px}
.stacked-lbl{font-size:12px;color:var(--ink2);width:68px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stacked-bar{flex:1;height:20px;border-radius:4px;display:flex;overflow:hidden}
.stacked-seg{height:100%;transition:width .5s ease;min-width:0}
.stacked-tot{font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums;flex-shrink:0;width:76px;text-align:right;font-weight:700}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* RESPONSIVE — 태블릿 */
@media(max-width:1200px){
  .g6{grid-template-columns:repeat(3,1fr)}
  .g5{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(2,1fr)}
  .pill-bar{grid-template-columns:repeat(2,1fr);height:auto;padding:12px 20px;gap:10px}
  .pill{border-right:none;border:1px solid var(--dark-border);border-radius:10px;padding:16px 20px}
  .pill-val{font-size:36px}
}
/* RESPONSIVE — 모바일 */
@media(max-width:768px){
  .g2,.g2e,.g3,.g5,.g6{grid-template-columns:1fr}
  .g4{grid-template-columns:repeat(2,1fr)}
  main{padding:12px 12px 60px}
  .hdr{padding:0 14px;gap:10px}
  .brand{font-size:14px}
  .brand-mark{width:22px;height:22px;font-size:11px}
  .mpick span{display:none}
  .mpick input{font-size:11px;padding:4px 7px}
  .sync-st{display:none}
  .tabs-bar{padding:0 8px}
  .tab-btn{font-size:11px;padding:0 10px}
  .pill-bar{grid-template-columns:repeat(2,1fr);height:auto;padding:10px 12px;gap:8px}
  .pill{border-right:none;border:1px solid var(--dark-border);border-radius:8px;padding:10px 12px}
  .pill-val{font-size:22px}
  .pill-lbl{font-size:10px}
  .pill-sub{font-size:11px}
  .kpi{padding:14px 16px}
  .kpi-val{font-size:26px}
  .kpi-lbl{font-size:11px}
  .kpi-sub{font-size:12px}
  .card{padding:14px 14px;overflow-x:auto}
  .card-title{font-size:13px}
  table{min-width:520px}
  th{font-size:10px;padding:8px 8px}
  td{font-size:12px;padding:8px 8px}
  .drawer{width:100%;right:-100%}
  .sec-label{font-size:10px;margin:14px 0 8px}
  .toolbar{flex-direction:column;align-items:flex-start;gap:8px}
  .chip{font-size:11px;padding:4px 10px}
  .srch{min-width:120px;font-size:12px}
  .stacked-lbl{width:52px;font-size:11px}
  .stacked-tot{width:60px;font-size:11px}
}


/* ══════════════════════════════════════
   BOOK MARKETING TIMELINE
══════════════════════════════════════ */
.mkt-timeline-wrap{overflow-x:auto;padding-bottom:8px}
.mkt-tl-header{display:flex;align-items:flex-end;margin-bottom:2px}
.mkt-tl-row{display:flex;align-items:stretch;margin-bottom:3px}
.mkt-lane-label{width:90px;flex-shrink:0;padding:0 8px 0 10px;display:flex;align-items:center;font-size:10px;font-weight:800;color:var(--ink2);min-height:28px;background:var(--surface2);border-radius:4px 0 0 4px;margin-right:2px}
.mkt-dates-row,.mkt-acts-row{display:flex;flex:1;min-width:0}
.mkt-day-num{font-size:9px;color:var(--ink3);padding:2px 0;line-height:1}
.mkt-month-label{font-size:9px;font-weight:800;color:var(--ink2);margin-bottom:1px}
.mkt-pub-marker{font-size:7px;font-weight:900;background:var(--accent);color:var(--accent-text);border-radius:2px;padding:1px 3px;margin-top:1px;white-space:nowrap}
.mkt-pubdate .mkt-day-num{color:var(--accent-text);background:var(--accent);border-radius:3px;font-weight:900}
.mkt-today-col .mkt-day-num{color:var(--bad);font-weight:900}
.mkt-weekend-col{opacity:.6}
.mkt-act-cell{width:28px;min-width:28px;flex-shrink:0;height:28px}
.mkt-act-bar{height:100%;display:flex;align-items:center;overflow:hidden;padding:0 3px;position:relative}
.mkt-act-label{font-size:8px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;position:absolute;left:4px;pointer-events:none}
.mkt-act-empty{height:100%;background:transparent}
.mkt-week-even{background:rgba(26,82,138,.05)}
.mkt-week-odd{background:rgba(26,82,138,.02)}
.mkt-prepub-col{background:rgba(154,98,16,.07) !important}
.mkt-weekend-col{opacity:.75}
.mkt-week-label{font-size:9px;font-weight:900;color:var(--info);letter-spacing:.02em;line-height:1;margin-bottom:1px;height:10px;white-space:nowrap;overflow:hidden}
.mkt-date-cell2{width:28px;min-width:28px;flex-shrink:0;text-align:center}
.mkt-dow{font-size:8px;font-weight:700;color:var(--ink3);line-height:1;margin-top:1px}
.mkt-dow-sun{color:var(--bad)}
.mkt-dow-sat{color:var(--info)}
.mkt-date-cell{width:28px;min-width:28px;text-align:center;position:relative;flex-shrink:0;padding-bottom:2px}


.cal-nav-btn:hover{border-color:var(--accent);color:var(--ink)}

.cal-wday{text-align:center;font-size:11px;font-weight:800;color:var(--ink3);padding:6px 0;letter-spacing:.04em}
.cal-wday.cal-weekend{color:var(--bad)}
.cal-cell{min-height:110px;border:1px solid var(--border);border-radius:var(--r3);padding:7px;cursor:pointer;transition:all .15s;background:var(--surface);position:relative}
.cal-cell:hover{border-color:var(--accent);background:var(--accent-dim)}
.cal-cell.cal-empty{background:var(--surface2);border-color:var(--border);cursor:default;opacity:.4}
.cal-cell.cal-today{border-color:var(--accent);border-width:2px;background:var(--accent-dim)}
.cal-cell.cal-selected{border-color:var(--ink);border-width:2px;background:var(--surface2)}
.cal-date-num{font-size:13px;font-weight:900;color:var(--ink);margin-bottom:5px}
.cal-date-num.cal-weekend{color:var(--bad)}
.cal-today .cal-date-num{color:var(--accent-text);background:var(--accent);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-acts{display:flex;flex-direction:column;gap:2px}
.cal-act-chip{display:flex;align-items:center;gap:4px;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;line-height:1.3}
.cal-more{font-size:9px;color:var(--ink3);font-weight:700;padding:1px 3px}
.cal-detail{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--r);padding:20px 22px;margin-top:14px;box-shadow:var(--sh-md)}
.cal-detail-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}

/* ── 타임라인 칩 툴팁 ── */
.tl-tooltip {
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:var(--ink);
  color:#fff;
  font-size:11px;
  font-weight:600;
  white-space:nowrap;
  padding:5px 9px;
  border-radius:5px;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s;
  z-index:999;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.tl-tooltip::after {
  content:'';
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:var(--ink);
}
.tl-chip-wrap:hover .tl-tooltip { opacity:1; }
.tl-chip-wrap { position:absolute; }
</style>
</head>

/* ─────────────────────────────────────
   CSV 파싱 유틸
───────────────────────────────────── */
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = splitCSVRow(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVRow(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i]||'').replace(/\r/g,'').trim(); });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
}

function splitCSVRow(row) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function toNum(v) { return Number(String(v||0).replace(/[,원%부]/g,'')) || 0; }

function sheetURL(gid) {
  return `https://docs.google.com/spreadsheets/d/${CFG.sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
}

/* ─────────────────────────────────────
   FETCH 시트
───────────────────────────────────── */
async function fetchSheet(gid) {
  const res = await fetch(sheetURL(gid), { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseCSV(await res.text());
}

/* ─────────────────────────────────────
   LOAD ALL SHEETS
───────────────────────────────────── */
async function loadSheets() {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');

  // GID 미설정이면 샘플 데이터 유지
  const allSet = Object.values(CFG.gids).every(g => g !== '');
  if (!CFG.sheetId || !allSet) {
    dot.className = 'sync-dot';
    txt.textContent = '샘플 데이터 표시 중';
    return;
  }

  dot.className = 'sync-dot loading';
  txt.textContent = '구글 시트 연결 중...';

  try {
    // 병렬 fetch (현재 탭 구조 기준)
    const [setting, monthly, cost, ship, scm, channel, bookList, weekSales] = await Promise.all([
      fetchSheet(CFG.gids.setting),   // 00_설정
      fetchSheet(CFG.gids.monthly),   // 01_월별실적
      fetchSheet(CFG.gids.cost),      // 02_비용원장
      fetchSheet(CFG.gids.ship),      // 03_출고실적
      fetchSheet(CFG.gids.scm),       // 04_마케팅실적
      fetchSheet(CFG.gids.channel),   // 05_채널실적
      fetchSheet(CFG.gids.bookList),  // 도서 목록
      fetchSheet(CFG.gids.weekSales), // 판매량_주차별
    ]);

    applySheetData({ setting, monthly, cost, ship, scm, channel, bookList, weekSales });

    SD.loaded = true;
    dot.className = 'sync-dot';
    txt.textContent = '시트 연동 완료 · ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

    renderPills();
    renderActive();

  } catch(e) {
    dot.className = 'sync-dot error';
    // 로컬(file://)에서 열면 CORS로 fetch 불가 → 안내 메시지
    const isLocal = location.protocol === 'file:';
    txt.textContent = isLocal
      ? '로컬 환경 — 샘플 데이터 표시 중 (GitHub Pages 배포 후 실시간 연동)'
      : '연동 실패 — 샘플 데이터 표시 중';
    dot.className = isLocal ? 'sync-dot' : 'sync-dot error';
    if(!isLocal) console.warn('Sheet fetch error:', e);
  }
}

/* ─────────────────────────────────────
   APPLY SHEET DATA → 전역 변수 반영
───────────────────────────────────── */
function applySheetData({ setting, monthly, cost, ship, scm, channel, bookList, weekSales }) {
  // ── 00_설정 → ANNUAL_TARGET, CFG.pw 갱신 ──
  const yr = new Date().getFullYear();
  if (setting && setting.length > 0) {
    const rowTarget = setting.find(r => r['항목']==='연간 매출 목표 (원)');
    if (rowTarget) {
      const val = toNum(rowTarget[String(yr)] || 0);
      if (val > 0) ANNUAL_TARGET = val;
    }
    const rowPw = setting.find(r => r['항목']==='대시보드 비밀번호');
    if (rowPw) {
      const pw = (rowPw['2025'] || '').trim();
      if (pw) CFG.pw = pw;
    }
  }

  // ── 01_월별실적 → M_SHIP_SALES 등 갱신 ──
  // 구조: 항목 | 연도 | 1월~12월
  const getMonthly = (label, year=yr) => {
    const row = monthly.find(r => r['항목']===label && String(r['연도'])===String(year));
    if (!row) return Array(12).fill(0);
    return MONTHS.map(m => toNum(row[m]||0));
  };

  const newShip   = getMonthly('총 매출');
  const newReturn = getMonthly('반품액');
  const newMkt    = getMonthly('마케팅팀 비용');
  const newPub    = getMonthly('출판팀 비용');
  const newCom    = getMonthly('인건비');
  const newTarget = getMonthly('월 목표 매출');
  // 서점별 출고 부수 (01_월별실적에서)
  const newKyobo      = getMonthly('교보문고');
  const newYes        = getMonthly('예스24');
  const newAladin     = getMonthly('알라딘');
  const newYoungpoong = getMonthly('영풍');
  const newCoupang    = getMonthly('쿠팡');
  const newBooksun    = getMonthly('북센');
  const newDosomae    = getMonthly('도소매(자유서적 포함)');
  const newOthers     = getMonthly('기타(현매)');

  // 목표 매출은 출고 매출과 무관하게 항상 반영
  if (newTarget.some(v=>v>0)) {
    M_TARGET.splice(0, 12, ...newTarget);
  }

  // 서점별 월별 출고 부수 → M_SCM 갱신
  const storeMonthly = MONTHS.map((_,i) => ({
    kyobo:      newKyobo[i]||0,
    yes:        newYes[i]||0,
    aladin:     newAladin[i]||0,
    youngpoong: newYoungpoong[i]||0,
    coupang:    newCoupang[i]||0,
    booksun:    newBooksun[i]||0,
    dosomae:    newDosomae[i]||0,
    others:     newOthers[i]||0,
  }));
  if (storeMonthly.some(d=>Object.values(d).some(v=>v>0))) {
    M_SCM.splice(0, 12, ...storeMonthly);
  }

  // 데이터가 있으면 전역 변수 교체
  if (newShip.some(v=>v>0)) {
    M_SHIP_SALES.splice(0, 12, ...newShip);
    M_RETURN.splice(0, 12, ...newReturn);
    newShip.forEach((v,i) => { M_NET_SALES[i] = v - newReturn[i]; });
    M_MKT_COST.splice(0, 12, ...newMkt);
    M_PUB_COST.splice(0, 12, ...newPub);
    M_COM_COST.splice(0, 12, ...newCom);
    M_MKT_COST.forEach((_,i) => { M_TOTAL_COST[i] = newMkt[i]+newPub[i]+newCom[i]; });
    M_TOTAL_COST.forEach((v,i) => { M_PROFIT[i] = M_NET_SALES[i]-v; });
  }

  // ── 도서 목록 → BOOKS 갱신 ──
  if (bookList && bookList.length > 0) {
    const mapped = bookList.map((r, i) => ({
      id: i+1,
      title:       r['도서명']||'',
      code:        r['내부 관리 코드']||'',
      author:      '',
      genre:       r['분야']||'',
      price:       toNum(r['정가']),
      supply:      0,
      unit:        0,
      cover:       ['#C9A227','#2D6A4A','#1E4D7B','#8B3A3A','#2A2A2A','#3A6A8A','#5A3A5A','#2F4F4F'][i%8],
      field:       r['관리']||'',
      mkt:         '',
      edit:        '',
      isbn:        r['ISBN']||'',
      pubDate:     r['출간일']||'',
      isStrategic: (r['전략도서 여부']||'').toString().toLowerCase()==='true',
      cumShipQty:  toNum(r['과거출고부수']),
      cumShipAmt:  toNum(r['과거출고매출']),
      cumSalesQty: toNum(r['과거판매부수']),
      cumSalesPub: toNum(r['과거판매액']),
      cumMktCost:  0, cumPubCost: 0, cumComCost: 0,
      mShipQty:0, mShipAmt:0, mReturn:0, mReturnAmt:0, stock:0, scm3m:0,
      stores:{kyobo:0,yes:0,aladin:0,naver:0,others:0},
      mktBreak:{meta:0,google:0,tiktok:0,store:0,etc:0},
    })).filter(b=>b.title);

    // 03_마케팅비용 → 도서별 누적 마케팅비
    // ── 02_비용원장 → 도서별 누적 비용
    cost.forEach(r => {
      if ((r['구분']||'').trim() !== '지급') return;
      const bookName = r['도서명'] || '';
      const b2 = mapped.find(x => x.title === bookName || x.code === bookName);
      const amt = toNum(r['비용']);
      const team = (r['귀속팀'] || '').trim();
      if (b2) {
        if (team === '마케팅') b2.cumMktCost += amt;
        else if (team === '출판') b2.cumPubCost += amt;
        else b2.cumComCost += amt;
      }
    });

    // ── 03_출고실적 → 당월 출고 + 기준월까지 누적 집계
    const m = getM();
    const curYM = document.getElementById('monthPicker').value; // YYYY-MM
    ship.forEach(r => {
      const b = mapped.find(x=>x.title===r['도서명']);
      if(!b) return;
      const ym = r['연도·월'] || '';
      // 2025년 이후 기준월 이하 누적 집계 (2024년 이전은 도서목록 과거데이터로 관리)
      if(ym && ym >= '2025-01' && ym <= curYM) {
        b.cumShipQty += toNum(r['출고부수']);
        b.cumShipAmt += toNum(r['출고매출(원)']);
      }
      // 당월 집계
      if(!ym || !ym.startsWith(curYM.slice(0,7))) return;
      b.mShipQty   += toNum(r['출고부수']);
      b.mShipAmt   += toNum(r['출고매출(원)']);
      b.mReturn    += toNum(r['반품부수']);
      b.mReturnAmt += toNum(r['반품액(원)']);
    });

    // 재고 — 03_출고실적 재고 컬럼 기준 (도서별 마지막 행 값)
    const stockByTitle = {};
    ship.forEach(r => {
      if(r['도서명'] && r['재고'] !== '' && r['재고'] !== undefined) {
        stockByTitle[r['도서명']] = toNum(r['재고']);
      }
    });
    mapped.forEach(b => {
      if(stockByTitle[b.title] !== undefined) b.stock = stockByTitle[b.title];
    });

    // 06_마케팅실적(SCM) → 당월 서점별
    // 최근 3개월 YM 목록 계산
    const cur3m = [];
    for(let i=0; i<3; i++){
      const d = new Date(curYM + '-01');
      d.setMonth(d.getMonth() - i);
      cur3m.push(d.toISOString().slice(0,7));
    }

    // SCM 도서명 매칭 맵 생성 (공백 제거 비교)
    const scmTitleMap = {};
    mapped.forEach(b => { scmTitleMap[b.title.replace(/\s/g,'')] = b; });

    scm.forEach(r => {
      const ym = r['연도·월'] || '';
      const scmTitle = (r['도서명']||'').replace(/\s/g,'');
      const b = mapped.find(x=>x.title===r['도서명']) || scmTitleMap[scmTitle];
      if(!b) return;
      // 당월 서점별 판매
      if(ym.startsWith(curYM.slice(0,7))) {
        b.stores.kyobo  += toNum(r['교보(부)']);
        b.stores.yes    += toNum(r['예스24(부)']);
        b.stores.aladin += toNum(r['알라딘(부)']);
        b.stores.naver  += toNum(r['영풍(부)']);
        b.stores.others += 0;
      }
      // 최근 3개월 실판매 누적
      if(cur3m.some(m => ym.startsWith(m))) {
        b.scm3m = (b.scm3m || 0) + toNum(r['총판매(부)']);
      }
      // 누적 실판매 전체 기간 (시중재고 계산용 - 2026년 출간 도서는 과거데이터 없음)
      b.cumSalesQty += toNum(r['총판매(부)']);
    });

    if(mapped.length > 0) {
      BOOKS.splice(0, BOOKS.length, ...mapped);
    }
  }

  // ── 판매량_주차별 → WEEK_SALES 갱신 ──
  if (weekSales && weekSales.length > 0) {
    Object.keys(WEEK_SALES).forEach(k => delete WEEK_SALES[k]);
    weekSales.forEach(r => {
      const title = r['도서명'] || '';
      const week  = r['연도·주차'] || '';
      const qty   = toNum(r['판매부수']);
      if (!title || !week) return;
      if (!WEEK_SALES[title]) WEEK_SALES[title] = [];
      WEEK_SALES[title].push({week, qty});
    });
  }

  // ── 07_채널실적 → CHANNELS 갱신 (당월 기준) ──
  if (channel.length > 0) {
    const curYM = document.getElementById('monthPicker').value.slice(0,7);
    const colors = ['#FDE200','#2D6A4A','#9A6210','#B02020','#1A528A'];
    const curRows = channel.filter(r => r['연도·월'] && String(r['연도·월']).startsWith(curYM));
    const useRows = curRows.length > 0 ? curRows : (() => {
      const byName = {};
      channel.filter(r=>r['채널명']).forEach(r => { byName[r['채널명']] = r; });
      return Object.values(byName);
    })();
    const mapped = useRows.map((r,i) => ({
      name:      r['채널명']||'',
      platform:  r['플랫폼']||'',
      reach:     toNum(r['도달수']),
      saves:     toNum(r['저장수']),
      followers: toNum(r['팔로워(누적)']),
      fanGain:   toNum(r['팔로워순증']),
      uploads:   toNum(r['업로드수']),
      shares:    toNum(r['공유수']),
      revenue:   toNum(r['수익 합'] || r['광고수익(원)'] || 0),
      color:     colors[i%5],
    })).filter(c=>c.name);
    if(mapped.length > 0) CHANNELS.splice(0, CHANNELS.length, ...mapped);
  }
}

/* ─────────────────────────────────────
   INIT
───────────────────────────────────── */
function initApp(){
  renderTabs(); renderPills(); renderActive();
  loadSheets();
  if(CFG.autoRefreshMin > 0) {
    setInterval(loadSheets, CFG.autoRefreshMin * 60 * 1000);
  }
}
function onMonthChange(){ renderPills(); renderActive(); }

/* ─────────────────────────────────────
   TABS
───────────────────────────────────── */
function renderTabs(){
  document.getElementById('tabsBar').innerHTML=TABS.map(t=>{
    if(t.div) return '<div class="tab-div"></div>';
    return `<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.label}</button>`;
  }).join('');
}
function setTab(id){
  activeTab=id;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  renderTabs(); renderActive();
}
function renderActive(){
  document.getElementById('pillBar').style.display = activeTab==='calendar' ? 'none' : '';
  if(activeTab==='summary') renderSummary();
  else if(activeTab==='ship')    renderShip();
  else if(activeTab==='mkt')     renderMkt();
  else if(activeTab==='cost')    renderCost();
  else if(activeTab==='channel') renderChannel();
  else if(activeTab==='books')    renderBooks();
  else if(activeTab==='calendar') renderCalendar();
  else if(activeTab==='data')    renderData();
}

/* ─────────────────────────────────────
   PILL BAR  (연 누적 4개)
───────────────────────────────────── */
function renderPills(){
  // 도서 마케팅 탭에서는 본부 지표 숨김
  document.getElementById('pillBar').style.display = activeTab==='calendar' ? 'none' : '';
  if(activeTab==='calendar') return;
  const m=getM();
  const cumShip   = M_SHIP_SALES.slice(0,m+1).reduce((a,b)=>a+b,0);
  const cumNet    = M_NET_SALES.slice(0,m+1).reduce((a,b)=>a+b,0);
  const cumCost   = M_TOTAL_COST.slice(0,m+1).reduce((a,b)=>a+b,0);
  const cumProfit = M_PROFIT.slice(0,m+1).reduce((a,b)=>a+b,0);
  const achPct    = pct(cumShip, ANNUAL_TARGET);
  document.getElementById('pillBar').innerHTML=`
    <div class="pill"><div class="pill-lbl">연 누적 매출 (총)</div><div class="pill-val">${won(cumShip)}</div><div class="pill-sub">연목표 ${won(ANNUAL_TARGET)} 대비</div></div>
    <div class="pill"><div class="pill-lbl">연 매출 달성률</div><div class="pill-val ${achPct>=100?'ok':''}">${achPct}%</div><div class="pill-sub">${m+1}개월 누적</div></div>
    <div class="pill"><div class="pill-lbl">연 누적 비용</div><div class="pill-val">${won(cumCost)}</div><div class="pill-sub">마케팅+출판+인건비</div></div>
    <div class="pill"><div class="pill-lbl">연 누적 손익</div><div class="pill-val ${cumProfit>=0?'ok':'dn'}">${cumProfit>=0?'+':''}${won(cumProfit)}</div><div class="pill-sub">순매출 기준</div></div>`;
  renderTrendChart(m);
}

/* ─────────────────────────────────────
   CHART HELPERS
───────────────────────────────────── */
function barChart(data, opts={}){
  const max=Math.max(...data.map(d=>d.v),1);
  const cf=opts.colorFn||(()=>'b-y');
  return `<div class="chart-wrap">${data.map(d=>`
    <div class="bar-col">
      <div class="bar-val">${d.lv||''}</div>
      <div class="bar-rect ${cf(d)}" style="height:${Math.max(3,Math.round(d.v/max*100))}%" data-tip="${esc(d.tip||'')}"></div>
      <div class="bar-lbl">${d.l}</div>
    </div>`).join('')}</div>`;
}

function stackedBarChart(rows, segs){
  // rows: [{label, vals:[...]}]  segs: [{label,color}]
  const maxTotal = Math.max(...rows.map(r=>r.vals.reduce((a,b)=>a+b,0)),1);
  return `<div class="stacked-wrap">${rows.map(r=>{
    const total=r.vals.reduce((a,b)=>a+b,0);
    const widths=r.vals.map(v=>pct(v,total));
    return `<div class="stacked-row">
      <div class="stacked-lbl">${r.label}</div>
      <div class="stacked-bar" style="width:${Math.max(10,pct(total,maxTotal))}%">
        ${segs.map((s,i)=>widths[i]>0?`<div class="stacked-seg" style="width:${widths[i]}%;background:${s.color}" title="${s.label}: ${won(r.vals[i])} (${widths[i]}%)"></div>`:'').join('')}
      </div>
      <div class="stacked-tot">${won(total)}</div>
    </div>`;
  }).join('')}
  <div class="legend">${segs.map(s=>`<div class="leg-item"><div class="leg-dot" style="background:${s.color}"></div>${s.label}</div>`).join('')}</div>
  </div>`;
}

function progBar(label,val,total,color,sub=''){
  const r=Math.min(pct(val,total),100);
  return `<div class="prog-item">
    <div class="prog-head"><b>${label}</b><span>${won(val)} / ${won(total)} · ${r}%${sub?' · '+sub:''}</span></div>
    <div class="prog-bg"><div class="prog-fill" style="width:${r}%;background:${color}"></div></div>
  </div>`;
}

/* ─────────────────────────────────────
   TREND CHART (연간 월별 추이)
───────────────────────────────────── */
function renderTrendChart(curM) {
  const el = document.getElementById('trend-chart');
  if (!el) return;

  const W = el.offsetWidth || 900;
  const H = 220;
  const PAD = {t:28, r:72, b:40, l:72};
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const shipData   = M_SHIP_SALES.map((v,i) => i <= curM ? v : null);
  const targetData = M_TARGET;
  const costData   = M_TOTAL_COST.map((v,i) => i <= curM ? v : null);
  const retData    = M_SHIP_SALES.map((v,i) => i <= curM && v > 0 ? Math.round(M_RETURN[i]/v*1000)/10 : null); // M_SHIP_SALES = 총 매출

  const maxAmt = Math.max(...M_TARGET, ...M_SHIP_SALES.filter((_,i)=>i<=curM), 1) * 1.15;
  const maxRet = Math.max(...retData.filter(v=>v!==null), 15);

  const slotW = cW / 12;
  const barW  = slotW * 0.52;
  const xPos  = i => PAD.l + (i + 0.5) / 12 * cW;
  const yAmt  = v => PAD.t + cH - (v / maxAmt) * cH;
  const yRet  = v => PAD.t + cH - (v / maxRet) * cH;
  const fmtAmt = v => v >= 100000000 ? (v/100000000).toFixed(1)+'억' : v >= 10000 ? Math.round(v/10000)+'만' : v;

  const yTicks = 4;
  const amtTicks = Array.from({length:yTicks+1},(_,i) => maxAmt * i / yTicks);
  const retTicks = Array.from({length:yTicks+1},(_,i) => maxRet * i / yTicks);

  // 목표 라인
  const targetPts = targetData.map((v,i) => `${xPos(i)},${yAmt(v)}`);
  const targetPath = `M${targetPts.join('L')}`;

  // 비용 라인
  const costPts = costData.map((v,i) => v !== null ? `${xPos(i)},${yAmt(v)}` : null).filter(Boolean);
  const costPath = costPts.length > 1 ? `M${costPts.join('L')}` : '';

  // 반품률 라인
  const retPts = retData.map((v,i) => v !== null ? `${xPos(i)},${yRet(v)}` : null).filter(Boolean);
  const retPath = retPts.length > 1 ? `M${retPts.join('L')}` : '';

  el.innerHTML = `
  <div style="display:flex;align-items:center;gap:24px;margin-bottom:18px">
    <span style="font-size:10px;font-weight:800;letter-spacing:.12em;color:#94A3B8;text-transform:uppercase">월별 실적 추이</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#94A3B8">
      <span style="display:inline-block;width:10px;height:10px;background:linear-gradient(135deg,#38BDF8,#0EA5E9);border-radius:2px"></span>달성매출
    </span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#94A3B8">
      <span style="display:inline-block;width:18px;height:1.5px;background:#F59E0B;vertical-align:middle"></span>목표매출
    </span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#94A3B8">
      <span style="display:inline-block;width:18px;height:1.5px;background:#A78BFA;vertical-align:middle;border-top:1.5px dashed #A78BFA"></span>총비용
    </span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#94A3B8">
      <span style="display:inline-block;width:8px;height:8px;background:#FB7185;border-radius:50%"></span>반품률(우)
    </span>
  </div>
  <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" id="tc-svg" style="overflow:visible">
    <defs>
      <linearGradient id="shipBarGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#38BDF8" stop-opacity=".95"/>
        <stop offset="100%" stop-color="#0369A1" stop-opacity=".6"/>
      </linearGradient>
      <linearGradient id="shipBarGradBad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FB7185" stop-opacity=".9"/>
        <stop offset="100%" stop-color="#BE123C" stop-opacity=".5"/>
      </linearGradient>
    </defs>

    <!-- 그리드 -->
    ${amtTicks.map(v => `
      <line x1="${PAD.l}" x2="${PAD.l+cW}" y1="${yAmt(v)}" y2="${yAmt(v)}" stroke="#FFFFFF0D" stroke-width="1"/>
      <text x="${PAD.l-10}" y="${yAmt(v)+4}" fill="#64748B" font-size="10" text-anchor="end" font-family="inherit">${fmtAmt(v)}</text>
    `).join('')}

    <!-- 우측 반품률 축 -->
    ${retTicks.slice(1).map(v => `
      <text x="${PAD.l+cW+10}" y="${yRet(v)+4}" fill="#FB7185" font-size="10" font-family="inherit" opacity=".7">${Math.round(v)}%</text>
    `).join('')}

    <!-- 월 레이블 -->
    ${months.map((mo,i) => `
      <text x="${xPos(i)}" y="${PAD.t+cH+22}" fill="${i===curM?'#F1F5F9':'#475569'}" font-size="10" text-anchor="middle" font-weight="${i===curM?700:400}" font-family="inherit">${mo}</text>
    `).join('')}

    <!-- 달성매출 막대 (목표 초과=파랑, 미달=빨강) -->
    <g id="tc-ship-bars">
      ${shipData.map((v,i) => v !== null ? `
        <rect x="${xPos(i)-barW/2}" y="${yAmt(v)}" width="${barW}" height="${Math.max(PAD.t+cH-yAmt(v),2)}"
          fill="url(#${v >= targetData[i] ? 'shipBarGrad' : 'shipBarGradBad'})" rx="3"/>
      ` : '').join('')}
    </g>

    <!-- 목표매출 라인 -->
    <path id="tc-target" d="${targetPath}" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- 총비용 라인 -->
    <path id="tc-cost" d="${costPath}" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4,3" opacity=".8"/>

    <!-- 반품률 라인 -->
    <path id="tc-ret" d="${retPath}" fill="none" stroke="#FB7185" stroke-width="1.5" opacity=".8"/>
    ${retData.map((v,i) => v !== null ? `
      <circle cx="${xPos(i)}" cy="${yRet(v)}" r="3" fill="#FB7185" stroke="#0F172A" stroke-width="1.5"/>
    ` : '').join('')}

    <!-- 기준월 강조 -->
    <line x1="${xPos(curM)}" x2="${xPos(curM)}" y1="${PAD.t}" y2="${PAD.t+cH}" stroke="#FFFFFF18" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- 호버 레이어 -->
    <line id="tc-hover-line" x1="0" x2="0" y1="${PAD.t}" y2="${PAD.t+cH}" stroke="#FFFFFF30" stroke-width="1" opacity="0"/>
    <g id="tc-tooltip" opacity="0">
      <rect id="tc-tt-bg" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text id="tc-tt-mo"     fill="#94A3B8" font-size="10" font-weight="700" font-family="inherit"/>
      <text id="tc-tt-ship"   fill="#38BDF8" font-size="11" font-family="inherit"/>
      <text id="tc-tt-target" fill="#F59E0B" font-size="11" font-family="inherit"/>
      <text id="tc-tt-cost"   fill="#A78BFA" font-size="11" font-family="inherit"/>
      <text id="tc-tt-ret"    fill="#FB7185" font-size="11" font-family="inherit"/>
    </g>
    <rect x="${PAD.l}" y="${PAD.t}" width="${cW}" height="${cH}" fill="transparent" id="tc-hover-area"/>
  </svg>`;

  // 호버 이벤트
  const svg = el.querySelector('svg');
  const hoverArea = el.querySelector('#tc-hover-area');
  const hLine = el.querySelector('#tc-hover-line');
  const tooltip = el.querySelector('#tc-tooltip');

  hoverArea.addEventListener('mousemove', (e) => {
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const idx = Math.min(11, Math.max(0, Math.floor((mx - PAD.l) / cW * 12)));
    const cx = xPos(idx);
    hLine.setAttribute('x1', cx); hLine.setAttribute('x2', cx);
    hLine.style.opacity = '1';

    const sv = shipData[idx], tv = targetData[idx], cv = costData[idx], rv = retData[idx];
    const achStr = sv != null && tv ? (sv >= tv ? '✓ 달성 ' : '✗ 달성 ') : null;
    const lines = [
      ['tc-tt-mo',     months[idx],                                    '#94A3B8'],
      ['tc-tt-ship',   sv  != null ? (achStr + fmtAmt(sv))            : null, sv != null && tv && sv >= tv ? '#38BDF8' : '#FB7185'],
      ['tc-tt-target', tv  != null ? '목표  ' + fmtAmt(tv)            : null, '#F59E0B'],
      ['tc-tt-cost',   cv  != null ? '비용  ' + fmtAmt(cv)            : null, '#A78BFA'],
      ['tc-tt-ret',    rv  != null ? '반품  ' + rv + '%'               : null, '#FB7185'],
    ].filter(l => l[1] !== null);

    const ttW = 144, lineH = 17, ttPad = 10;
    const ttH = lines.length * lineH + ttPad * 2;
    let ttX = cx + 14, ttY = PAD.t + 4;
    if (ttX + ttW > W - PAD.r) ttX = cx - ttW - 14;

    const bg = el.querySelector('#tc-tt-bg');
    bg.setAttribute('x', ttX); bg.setAttribute('y', ttY);
    bg.setAttribute('width', ttW); bg.setAttribute('height', ttH);

    lines.forEach(([id, txt, fill], i) => {
      const t = el.querySelector('#' + id);
      if (t) { t.setAttribute('x', ttX + ttPad); t.setAttribute('y', ttY + ttPad + 11 + i * lineH); t.setAttribute('fill', fill); t.textContent = txt; }
    });
    tooltip.style.opacity = '1';
  });

  hoverArea.addEventListener('mouseleave', () => { hLine.style.opacity = '0'; tooltip.style.opacity = '0'; });

  if (el._animated) return;
  el._animated = true;

  const allBars = el.querySelectorAll('#tc-ship-bars rect');
  allBars.forEach((bar, i) => {
    const origY = parseFloat(bar.getAttribute('y'));
    const origH = parseFloat(bar.getAttribute('height'));
    bar.setAttribute('y', origY + origH);
    bar.setAttribute('height', 0);
    setTimeout(() => {
      bar.style.transition = 'y .5s cubic-bezier(.4,0,.2,1), height .5s cubic-bezier(.4,0,.2,1)';
      bar.setAttribute('y', origY);
      bar.setAttribute('height', origH);
    }, i * 60);
  });
}

function animateLine(path, onDone) {
  if (!path) return;
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.style.transition = 'none';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      path.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)';
      path.style.strokeDashoffset = '0';
      path.addEventListener('transitionend', () => {
        const el = document.getElementById('trend-chart');
        if (el) el._animated = true;
        const show = (id, op, delay) => setTimeout(() => {
          const e = document.getElementById(id);
          if (e) { e.style.transition = 'opacity .5s'; e.style.opacity = op; }
        }, delay);
        show('tc-ship-fill', '1', 0);
        show('tc-target', '.7', 100);
        show('tc-cost', '.8', 200);
        show('tc-ret', '.7', 300);
        show('tc-dots', '1', 400);
      }, {once:true});
    });
  });
}

/* ─────────────────────────────────────
   WEEKLY SALES CHART
───────────────────────────────────── */
function renderWeeklyChart() {
  const strategic = BOOKS.filter(b => b.isStrategic && WEEK_SALES[b.title]);
  if (!strategic.length) return '<div style="color:var(--ink3);padding:20px 0;text-align:center">전략도서 주차별 데이터 없음</div>';

  const colors = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899'];

  const chartData = strategic.map((b, ci) => {
    const weeks = (WEEK_SALES[b.title] || [])
      .sort((a, c) => a.week.localeCompare(c.week))
      .map((d, i) => ({ x: i+1, y: d.qty, week: d.week }));
    return { title: b.title, weeks, color: colors[ci % colors.length] };
  }).filter(d => d.weeks.length > 0);

  if (!chartData.length) return '<div style="color:var(--ink3);padding:20px 0;text-align:center">데이터 없음</div>';

  const maxWeeks = Math.max(...chartData.map(d => d.weeks.length), 1);
  const maxQty   = Math.max(...chartData.flatMap(d => d.weeks.map(w => w.y)), 1);

  const W = 900, H = 300;
  const PAD = {t:24, r:24, b:40, l:64};
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;

  const xPos = i => PAD.l + (i / Math.max(maxWeeks-1,1)) * cW;
  const yPos = v => PAD.t + cH - (v / maxQty) * cH;

  const fmtN = v => v >= 1000 ? (v/1000).toFixed(1)+'k' : v;

  const yTicks = 4;
  const gridLines = Array.from({length:yTicks+1},(_,i) => {
    const v = Math.round(maxQty * i / yTicks);
    return `<line x1="${PAD.l}" x2="${PAD.l+cW}" y1="${yPos(v)}" y2="${yPos(v)}" stroke="#0000001A" stroke-width="1"/>
    <text x="${PAD.l-8}" y="${yPos(v)+4}" fill="#94A3B8" font-size="11" text-anchor="end">${fmtN(v)}</text>`;
  }).join('');

  const xCount = Math.min(maxWeeks, 20);
  const xLabels = Array.from({length:xCount},(_,i) => {
    const xi = Math.round(i * (maxWeeks-1) / Math.max(xCount-1,1));
    return `<text x="${xPos(xi)}" y="${PAD.t+cH+18}" fill="#94A3B8" font-size="10" text-anchor="middle">${xi+1}주</text>`;
  }).join('');

  const lines = chartData.map(d => {
    if (!d.weeks.length) return '';
    const pts = d.weeks.map((w,i) => `${xPos(i)},${yPos(w.y)}`).join('L');
    const dots = d.weeks.map((w,i) => `<circle cx="${xPos(i)}" cy="${yPos(w.y)}" r="3.5" fill="${d.color}" stroke="#fff" stroke-width="1.5"/>`).join('');
    return `<path d="M${pts}" fill="none" stroke="${d.color}" stroke-width="2.5"/>${dots}`;
  }).join('');

  const legend = chartData.map(d =>
    `<span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2)">
      <span style="display:inline-block;width:18px;height:3px;background:${d.color};border-radius:2px"></span>
      ${esc(d.title)}
    </span>`
  ).join('');

  return `
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:18px">${legend}</div>
    <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">
      ${gridLines}
      ${xLabels}
      ${lines}
    </svg>`;
}

    </div>

    <!-- 누적 비용 상세 -->
    <div class="sec-label gap2">누적 비용 상세</div>
    <div class="g2e">
      <div class="card">
        <div class="card-title">월별 팀 비용 추이</div>

      <div class="card">
        <div class="card-title">누적 비용 구성</div>
        ${progBar('마케팅팀', cumMkt, cumTotal, '#FDE200')}

function renderBooks(){
  const rows=BOOKS.map(b=>{
    const cumCost=b.cumMktCost+b.cumPubCost+b.cumComCost;
    const profit=b.cumSalesPub-cumCost;
    const roas=b.cumMktCost?Math.round(b.cumSalesPub/b.cumMktCost*100):0;
    const roi =cumCost?Math.round(b.cumSalesPub/cumCost*100):0;
    return {...b, cumCost, profit, roas, roi};
  });
  const sorted=sortRows(rows,'books',['cumShipQty','cumShipAmt','cumSalesQty','cumSalesPub','cumMktCost','cumCost','roas','roi','profit']);

  document.getElementById('tab-books').innerHTML=`
    <div class="card gap">
      <div class="card-title">도서별 종합 실적 <small>컬럼 클릭 시 정렬 · 행 클릭 시 상세</small></div>
      <table>
        <tr>
          ${thS('books','title','도서명')}
          <th>정가</th><th>분야</th><th>저자</th>

          ${thS('books','cumShipQty','누적 출고부수','right')}
          ${thS('books','cumShipAmt','누적 출고매출','right')}
          ${thS('books','cumSalesQty','누적 판매부수','right')}
          ${thS('books','cumSalesPub','누적 판매액','right')}
          ${thS('books','cumMktCost','누적 마케팅비','right')}
          ${thS('books','roas','ROAS','right')}
          ${thS('books','cumCost','누적 총비용','right')}
          ${thS('books','roi','ROI','right')}
          ${thS('books','profit','최종 손익','right')}
        </tr>
        ${sorted.map(b=>`<tr onclick="openDrawer(${b.id})" style="cursor:pointer">
          <td><b>${esc(b.title)}</b></td>
          <td style="font-size:11px;white-space:nowrap">${b.price.toLocaleString()}원</td>
          <td><span class="badge neutral">${esc(b.genre)}</span></td>

          <td><span class="badge ${b.field==='IMC1'?'acc':b.field==='IMC2'?'info':'good'}">${b.field}</span></td>
          <td class="right">${b.cumShipQty.toLocaleString()}부</td>
          <td class="right">${won(b.cumShipAmt)}</td>
          <td class="right">${b.cumSalesQty.toLocaleString()}부</td>
          <td class="right">${won(b.cumSalesPub)}</td>
          <td class="right">${won(b.cumMktCost)}</td>
          <td class="right"><b style="color:${b.roas>=200?'var(--good)':b.roas>=100?'var(--warn)':'var(--bad)'}">${b.roas}%</b></td>
          <td class="right">${won(b.cumCost)}</td>
          <td class="right"><b style="color:${b.roi>=150?'var(--good)':b.roi>=100?'var(--warn)':'var(--bad)'}">${b.roi}%</b></td>
          <td class="right"><b style="color:${b.profit>=0?'var(--good)':'var(--bad)'}">${b.profit>=0?'+':''}${won(b.profit)}</b></td>
        </tr>`).join('')}
      </table>
    </div>`;
}

function renderCalendar() {
  const book = MKT_BOOKS.find(b=>b.code===calBook) || MKT_BOOKS[0];
  const actions = MKT_ACTIONS[calBook] || [];
  const sales   = MKT_SALES[calBook];

  // 날짜 범위 계산
  const pubDate   = new Date(book.pubDate);
  // 시작: 항상 출간일 -10일 (예약판매 구간)
  const startDate = new Date(pubDate); startDate.setDate(startDate.getDate()-10);

  const allDates  = actions.map(a=>new Date(a.date));
  const maxActDate= allDates.length
    ? new Date(Math.max(...allDates.map(a=>{
        const d=new Date(a.date); d.setDate(d.getDate()+(a.days||1)-1); return d;
      })))
    : new Date(pubDate.getTime() + 89*86400000);

  // 최소 출간 후 89일 보장
  const minEnd   = new Date(pubDate); minEnd.setDate(minEnd.getDate()+89);
  const finalEnd = maxActDate > minEnd ? maxActDate : minEnd;

  // 날짜 배열
  const dates = [];
  for(let d=new Date(startDate); d<=finalEnd; d.setDate(d.getDate()+1)){
    dates.push(new Date(d));
  }

  // 총 비용
  const totalCost = actions.reduce((s,a)=>s+a.cost,0);
  const paidActions = actions.filter(a=>a.cost>0);
  const totalActions = actions.length;

  // 출간 후 경과일
  const today = new Date();
  const daysSincePub = Math.floor((today-pubDate)/86400000);

  // 목표 달성률 (샘플: 현재까지 판매 기준)
  const currentSales = sales ? sales.data.reduce((s,d)=>{
    return s + Object.values(d).filter(v=>typeof v==='number').reduce((a,b)=>a+b,0);
  },0) : Math.round(book.goal.qty * 0.18);
  const goalPct = Math.min(Math.round(currentSales/book.goal.qty*100),100);

  document.getElementById('tab-calendar').innerHTML = `
    <!-- 도서 선택 -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2)">
      <span style="font-size:12px;font-weight:800;color:var(--ink2)">도서 선택</span>
      <select onchange="calBook=this.value;renderCalendar()" style="border:1px solid var(--border2);background:var(--surface);color:var(--ink);border-radius:var(--r3);padding:7px 12px;font-family:var(--sans);font-size:13px;font-weight:700;outline:none;cursor:pointer;flex:1;max-width:360px">
        ${MKT_BOOKS.map(b=>`<option value="${b.code}" ${b.code===calBook?'selected':''}>${b.name}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--ink3)">출간일 ${book.pubDate} · 정가 ${book.price.toLocaleString()}원</span>
    </div>

    <!-- 상단 KPI -->
    <div class="g5 gap" style="margin-bottom:16px">
      <div class="kpi">
        <div class="kpi-lbl">출간 후 경과</div>
        <div class="kpi-val">${daysSincePub>0?daysSincePub+'일':'D-'+Math.abs(daysSincePub)}</div>
        <div class="kpi-sub">${book.pubDate}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">3개월 목표</div>
        <div class="kpi-val">${(book.goal.qty/10000).toFixed(0)}만부</div>
        <div class="kpi-sub">목표 순위 ${book.goal.rank}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">현재 판매</div>
        <div class="kpi-val good">${currentSales.toLocaleString()}부</div>
        <div class="kpi-sub">목표 대비 ${goalPct}%<div class="kpi-bar-wrap"><div class="kpi-bar" style="width:${goalPct}%"></div></div></div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">총 마케팅비</div>
        <div class="kpi-val">${won(totalCost)}</div>
        <div class="kpi-sub">${paidActions.length}건 유상 집행</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">총 액션 수</div>
        <div class="kpi-val">${totalActions}건</div>
        <div class="kpi-sub">${MKT_LANES.filter(l=>actions.some(a=>a.lane===l)).length}개 채널</div>
      </div>
    </div>

    <!-- 일자형 마케팅 타임라인 -->
    <div class="card gap">
      <div class="card-title">마케팅 타임라인 <small>출간일 기준 · 레인별 액션 밀도</small></div>
      <div class="mkt-timeline-wrap" id="tl-wrap"></div>
      </div>

      <!-- 범례 -->
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        ${MKT_LANES.filter(l=>actions.some(a=>a.lane===l)).map(l=>{
          const c=LANE_COLORS[l];
          return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:${c.text}">
            <span style="width:20px;height:8px;background:${c.bg};border:1.5px solid ${c.border};border-radius:2px"></span>${l}
          </span>`;
        }).join('')}
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--good)">
          <span style="width:12px;height:12px;background:var(--good);border-radius:2px;opacity:.8"></span>판매량
        </span>
      </div>
    </div>

    <!-- 하단: 비용 현황 + 제안 히스토리 나란히 -->
    <div class="g2e gap2">
      <!-- 매체별 비용 -->
      <div class="card">
        <div class="card-title">매체별 비용 집행</div>
        ${(()=>{
          const byLane = {};
          actions.forEach(a=>{ if(a.cost>0) byLane[a.lane]=(byLane[a.lane]||0)+a.cost; });
          const entries = Object.entries(byLane).sort((a,b)=>b[1]-a[1]);
          const max = Math.max(...entries.map(([,v])=>v),1);
          return entries.map(([lane,cost])=>{
            const c=LANE_COLORS[lane]||{bg:"#eee",text:"#555",border:"#ccc"};
            const pct2=Math.round(cost/totalCost*100);
            return `<div class="prog-item">
              <div class="prog-head"><b style="color:${c.text}">${lane}</b><span>${won(cost)} · ${pct2}%</span></div>
              <div class="prog-bg"><div class="prog-fill" style="width:${Math.round(cost/max*100)}%;background:${c.border}"></div></div>
            </div>`;
          }).join('') || '<div class="empty-row">비용 데이터 없음</div>';
        })()}
      </div>

      <!-- 액션 목록 -->
      <div class="card">
        <div class="card-title">액션 목록 <small>${totalActions}건</small></div>
        <div style="max-height:280px;overflow-y:auto">
          <table>
            <tr><th>날짜</th><th>채널</th><th>내용</th><th class="right">비용</th></tr>
            ${actions.sort((a,b)=>a.date.localeCompare(b.date)).map(a=>{
              const c=LANE_COLORS[a.lane]||{bg:"#eee",text:"#555"};
              return `<tr>
                <td style="font-size:11px;color:var(--ink3);white-space:nowrap">${a.date.slice(5)}</td>
                <td><span class="badge" style="background:${c.bg};color:${c.text};font-size:9px">${a.lane}</span></td>
                <td style="font-size:12px">${esc(a.label)}</td>
                <td class="right" style="font-size:11px">${a.cost?won(a.cost):'—'}</td>
              </tr>`;
            }).join('')}
          </table>
        </div>
      </div>
    </div>`;
  // innerHTML 세팅 후 타임라인 DOM 직접 렌더
  renderTimeline(dates, pubDate, today, actions, sales);
}

function renderTimeline(dates, pubDate, today, actions, sales) {
  var CELL_W = 34;
  var LBL_W  = 120;
  var STORES_TL = ["교보","예스24","영풍","알라딘"];
  if(!window.tlExpanded) window.tlExpanded = {};

  var salesByDate = {};
  if (sales) {
    sales.data.forEach(function(row) {
      var total = STORES_TL.reduce(function(s,st){ return s+(row[st]||0); }, 0);
      salesByDate[row.date] = Object.assign({total:total}, row);
    });
  }

  var MO_BG   = ["rgba(26,82,138,.08)","rgba(101,40,170,.07)","rgba(30,122,56,.07)","rgba(0,150,130,.07)","rgba(26,82,138,.09)","rgba(101,40,170,.08)","rgba(176,32,32,.08)","rgba(220,120,0,.07)","rgba(0,150,200,.07)","rgba(180,60,120,.07)","rgba(80,160,80,.07)","rgba(100,100,180,.07)"];
  var MO_TEXT = ["#1A528A","#65287A","#1E7A38","#00785A","#1A528A","#65287A","#901818","#8A4A00","#00628A","#782050","#306830","#3A3878"];

  function wkBg(d){
    var diff=Math.floor((d-pubDate)/86400000);
    if(diff<0) return 'rgba(154,98,16,.05)';
    return Math.floor(diff/7)%2===0?'transparent':'rgba(0,0,0,.025)';
  }

  var wrap=document.getElementById('tl-wrap');
  if(!wrap) return;
  var savedScroll=wrap.scrollLeft||0;
  wrap.innerHTML='';
  wrap.style.cssText='overflow-x:auto;padding-bottom:8px;';
  var totalW=dates.length*CELL_W;

  // ── DOM 행 생성 헬퍼 ──
  function makeRow(h, lblHTML, lblStyle, noBg){
    var row=document.createElement('div');
    row.style.cssText='display:flex;min-height:'+h+'px;';
    var lbl=document.createElement('div');
    lbl.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;display:flex;align-items:center;padding:0 8px 0 10px;box-sizing:border-box;overflow:hidden;'+(lblStyle||'');
    lbl.innerHTML=lblHTML||'';
    row.appendChild(lbl);
    var bar=document.createElement('div');
    bar.style.cssText='width:'+totalW+'px;flex-shrink:0;position:relative;min-height:'+h+'px;';
    if(!noBg) dates.forEach(function(d,idx){
      var bg=document.createElement('div');
      bg.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;top:0;bottom:0;background:'+wkBg(d)+';';
      bar.appendChild(bg);
    });
    row.appendChild(bar);
    wrap.appendChild(row);
    return {lbl:lbl,bar:bar,row:row};
  }

  function makeSectionHeader(text){
    var div=document.createElement('div');
    div.style.cssText='display:flex;height:20px;';
    var l=document.createElement('div');
    l.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:var(--surface3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:10px;';
    l.innerHTML='<span style="font-size:9px;font-weight:800;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;">'+text+'</span>';
    div.appendChild(l);
    var r=document.createElement('div');
    r.style.cssText='width:'+totalW+'px;background:var(--surface3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);';
    div.appendChild(r);
    wrap.appendChild(div);
  }

  function makeDivider(){
    var div=document.createElement('div');div.style.cssText='display:flex;height:1px;';
    var l=document.createElement('div');l.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:var(--border);';div.appendChild(l);
    var r=document.createElement('div');r.style.cssText='width:'+totalW+'px;background:var(--border);';div.appendChild(r);
    wrap.appendChild(div);
  }

  // ── 칩의 날짜 범위 계산 ──
  function getChipRange(a){
    var sDate=new Date(a.date),eDate=new Date(a.date);
    eDate.setDate(eDate.getDate()+(a.days||1)-1);
    var sIdx=dates.findIndex(function(d){return d.toDateString()===sDate.toDateString();});
    var eIdx=dates.findIndex(function(d){return d.toDateString()===eDate.toDateString();});
    if(sIdx<0) return null;
    if(eIdx<0) eIdx=dates.length-1;
    return {sIdx:sIdx, eIdx:eIdx};
  }

  // ── 겹침 방지: 액션 목록을 여러 줄(트랙)로 배분 ──
  function assignTracks(acts){
    var tracks=[]; // tracks[i] = 마지막 eIdx
    var result=acts.map(function(a){
      var range=getChipRange(a);
      if(!range) return {a:a,track:0,range:null};
      // 비어있는 트랙 찾기
      var placed=false;
      for(var t=0;t<tracks.length;t++){
        if(tracks[t]<range.sIdx){ // 겹치지 않음
          tracks[t]=range.eIdx;
          return {a:a,track:t,range:range};
        }
      }
      // 새 트랙
      tracks.push(range.eIdx);
      return {a:a,track:tracks.length-1,range:range};
    });
    return {items:result, trackCount:Math.max(tracks.length,1)};
  }

  // ── 칩 DOM 생성 ──
  function makeChip(bar, a, chipH, rowH, trackH, trackIdx, c, isExpandable){
    var range=getChipRange(a);
    if(!range) return;
    var spanCells=range.eIdx-range.sIdx+1, spanW=spanCells*CELL_W;
    var chipTop=trackIdx*trackH+Math.round((trackH-chipH)/2);

    var chip=document.createElement('div');
    chip.style.cssText=[
      'position:absolute',
      'left:'+(range.sIdx*CELL_W+1)+'px',
      'width:'+(spanW-2)+'px',
      'height:'+chipH+'px',
      'top:'+chipTop+'px',
      'background:'+c.bg,
      'border:1.5px solid '+c.border,
      'border-radius:4px',
      'display:flex','align-items:center',
      'overflow:hidden','box-sizing:border-box','z-index:2','cursor:pointer',
    ].join(';');
    chip.title=a.label+' — '+a.detail+(a.cost?' ('+won(a.cost)+')':'');

    var fs=spanCells===1?Math.max(6,Math.min(8,Math.floor((spanW-28)/5))):8;
    var txt=document.createElement('span');
    txt.style.cssText='padding:0 5px;font-size:'+fs+'px;font-weight:700;color:'+c.text+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;flex:1;min-width:0;';
    txt.textContent=a.label;
    chip.appendChild(txt);

    if(isExpandable){
      var arrow=document.createElement('span');
      arrow.style.cssText='font-size:10px;color:'+c.text+';padding:0 7px 0 2px;flex-shrink:0;transition:transform .2s;user-select:none;font-weight:900;';
      arrow.textContent=window.tlExpanded[a.date+a.lane]?'▲':'▼';
      chip.appendChild(arrow);
      chip.addEventListener('click',function(e){
        e.stopPropagation();
        window.tlExpanded[a.date+a.lane]=!window.tlExpanded[a.date+a.lane];
        renderTimeline(dates,pubDate,today,actions,sales);
        setTimeout(function(){wrap.scrollLeft=savedScroll;},10);
      });
    } else {
      chip.addEventListener('click',function(e){
        e.stopPropagation();
        openDetailPanel(a,c);
      });
    }
    bar.appendChild(chip);
  }

  // ── 레인 행 추가 (멀티트랙) ──
  function addLaneRow(lane, acts, c){
    var TRACK_H=26, CHIP_H=20;
    var assigned=assignTracks(acts);
    var numTracks=assigned.trackCount;
    var rowH=numTracks*TRACK_H;

    var r=makeRow(rowH,
      '<span style="font-size:9px;font-weight:700;color:'+c.text+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;display:block">'+lane+'</span>',
      'border-left:3px solid '+c.border+';align-items:flex-start;padding-top:4px;');

    assigned.items.forEach(function(item){
      if(!item.range) return;
      var isExp=item.a.type==='expandable';
      makeChip(r.bar,item.a,CHIP_H,rowH,TRACK_H,item.track,c,isExp);
    });
    return r;
  }

  // ── 날짜 파싱 (7/8 → Date) ──
  function parseMonthDay(str){
    var parts=str.trim().replace('일','').split('/');
    return new Date(2026, parseInt(parts[0])-1, parseInt(parts[1]));
  }

  // ── 소재 드롭다운 행 삽입 (wrap에 직접, 특정 행 뒤에) ──
  function insertExpandedRows(afterRow, a, c){
    if(!a.materials||!a.materials.length) return;
    var phases={},phOrder=[];
    a.materials.forEach(function(m){
      var ph=m.phase||'기타';
      if(!phases[ph]){phases[ph]=[];phOrder.push(ph);}
      phases[ph].push(m);
    });

    // afterRow.row 다음에 삽입
    var anchor=afterRow.row.nextSibling;

    phOrder.forEach(function(ph){
      // 페이즈 헤더
      var phDiv=document.createElement('div');
      phDiv.style.cssText='display:flex;height:16px;';
      var phL=document.createElement('div');
      phL.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:rgba(99,102,241,.06);border-left:3px solid '+c.border+';padding-left:14px;display:flex;align-items:center;box-sizing:border-box;';
      phL.innerHTML='<span style="font-size:8px;font-weight:800;color:#6366F1">'+ph+'</span>';
      phDiv.appendChild(phL);
      var phR=document.createElement('div');
      phR.style.cssText='width:'+totalW+'px;background:rgba(99,102,241,.04);border-top:1px dashed rgba(99,102,241,.2);';
      phDiv.appendChild(phR);
      wrap.insertBefore(phDiv,anchor);

      // 소재 칩 행 (겹침 방지)
      var mActs=phases[ph].map(function(m){
        if(!m.days) return null;
        var parts=m.days.split('~');
        var sDt=parseMonthDay(parts[0]),eDt=parseMonthDay(parts[parts.length-1]);
        var sIdx2=dates.findIndex(function(d){return d.toDateString()===sDt.toDateString();});
        var eIdx2=dates.findIndex(function(d){return d.toDateString()===eDt.toDateString();});
        if(sIdx2<0) return null;
        if(eIdx2<0) eIdx2=sIdx2;
        return {m:m, sIdx:sIdx2, eIdx:eIdx2};
      }).filter(Boolean);

      // 트랙 배분
      var mTracks=[];
      var mAssigned=mActs.map(function(item){
        for(var t=0;t<mTracks.length;t++){
          if(mTracks[t]<item.sIdx){mTracks[t]=item.eIdx;return{item:item,track:t};}
        }
        mTracks.push(item.eIdx);
        return{item:item,track:mTracks.length-1};
      });
      var numMTracks=Math.max(mTracks.length,1);
      var MTRACK_H=18,MCHIP_H=13;
      var mRowH=numMTracks*MTRACK_H;

      var subDiv=document.createElement('div');
      subDiv.style.cssText='display:flex;min-height:'+mRowH+'px;';
      var subL=document.createElement('div');
      subL.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:rgba(99,102,241,.03);border-left:3px solid '+c.border+';padding-left:18px;display:flex;align-items:flex-start;padding-top:3px;box-sizing:border-box;';
      subL.innerHTML='<span style="font-size:7px;font-weight:500;color:var(--ink3)">소재</span>';
      subDiv.appendChild(subL);
      var subR=document.createElement('div');
      subR.style.cssText='width:'+totalW+'px;position:relative;min-height:'+mRowH+'px;background:rgba(99,102,241,.03);';
      dates.forEach(function(d2,idx2){
        var bg2=document.createElement('div');
        bg2.style.cssText='position:absolute;left:'+(idx2*CELL_W)+'px;width:'+CELL_W+'px;top:0;bottom:0;background:'+wkBg(d2)+';';
        subR.appendChild(bg2);
      });

      mAssigned.forEach(function(ma){
        var item=ma.item,m=item.m,t=ma.track;
        var spanCells=item.eIdx-item.sIdx+1,spanW=spanCells*CELL_W;
        var chipTop=t*MTRACK_H+Math.round((MTRACK_H-MCHIP_H)/2);
        var subChip=document.createElement('div');
        subChip.style.cssText=[
          'position:absolute','left:'+(item.sIdx*CELL_W+1)+'px','width:'+(spanW-2)+'px',
          'height:'+MCHIP_H+'px','top:'+chipTop+'px',
          'background:rgba(99,102,241,.12)',
          'border:1px dashed rgba(99,102,241,.5)','border-radius:2px',
          'display:flex','align-items:center','overflow:hidden','z-index:2','cursor:pointer',
        ].join(';');
        subChip.title=m.label+' ('+m.days+')';
        var stxt=document.createElement('span');
        stxt.style.cssText='padding:0 4px;font-size:7px;font-weight:600;color:#6366F1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:'+(spanW-6)+'px;display:block;';
        stxt.textContent=m.label;
        subChip.appendChild(stxt);
        subChip.addEventListener('click',function(e){
          e.stopPropagation();
          openDetailPanel(Object.assign({},a,{label:m.label,detail:m.desc||'',cost:m.cost,date:m.days}),c,m);
        });
        subR.appendChild(subChip);
      });

      subDiv.appendChild(subR);
      wrap.insertBefore(subDiv,anchor);
    });
  }

  // ══ 헤더 행들 ══
  var moR=makeRow(16,'','border:none;background:transparent;',true);
  var i=0;
  while(i<dates.length){
    var d=dates[i],mIdx=d.getMonth(),span=1;
    while(i+span<dates.length&&dates[i+span].getMonth()===mIdx)span++;
    var mc=document.createElement('div');
    mc.style.cssText='position:absolute;left:'+(i*CELL_W)+'px;width:'+(span*CELL_W)+'px;height:16px;top:0;background:'+MO_BG[mIdx]+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:'+MO_TEXT[mIdx]+';border-left:1px solid rgba(0,0,0,.08);box-sizing:border-box;';
    mc.textContent=(mIdx+1)+'월';
    moR.bar.appendChild(mc);i+=span;
  }
  var wkR=makeRow(13,'','border:none;background:transparent;',true);
  i=0;
  while(i<dates.length){
    var d=dates[i],diff=Math.floor((d-pubDate)/86400000),isPre=diff<0,wkId=Math.floor(diff/7),span=1;
    if(isPre){while(i+span<dates.length&&Math.floor((dates[i+span]-pubDate)/86400000)<0)span++;}
    else{while(i+span<dates.length){var dd2=Math.floor((dates[i+span]-pubDate)/86400000);if(dd2<0||Math.floor(dd2/7)!==wkId)break;span++;}}
    diff=Math.floor((d-pubDate)/86400000);
    var wc=document.createElement('div');
    wc.style.cssText='position:absolute;left:'+(i*CELL_W)+'px;width:'+(span*CELL_W)+'px;height:13px;top:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:'+(isPre?'#9A6210':'#AAAAAA')+';white-space:nowrap;overflow:hidden;background:'+wkBg(d)+';';
    wc.textContent=isPre?'예약판매':(Math.floor(diff/7)+1)+'주차';
    wkR.bar.appendChild(wc);i+=span;
  }
  var dtR=makeRow(17,'','border:none;background:transparent;');
  dates.forEach(function(d,idx){
    var isPub2=d.toDateString()===pubDate.toDateString(),isT=d.toDateString()===today.toDateString();
    var cell=document.createElement('div');
    cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:17px;top:0;display:flex;align-items:center;justify-content:center;z-index:1;';
    var num=document.createElement('div');
    if(isPub2)num.style.cssText='background:var(--accent);color:var(--accent-text);border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;';
    else num.style.cssText='font-size:10px;font-weight:'+(isT?800:400)+';color:'+(isT?'var(--bad)':'#BBBBBB')+';';
    num.textContent=d.getDate();
    cell.appendChild(num);dtR.bar.appendChild(cell);
  });
  var DOWS=["일","월","화","수","목","금","토"];
  var dowR=makeRow(13,'','border:none;background:transparent;');
  dates.forEach(function(d,idx){
    var col=d.getDay()===0?'#D0504A':d.getDay()===6?'#6090C0':'#CCCCCC';
    var cell=document.createElement('div');
    cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:13px;top:0;text-align:center;font-size:8px;font-weight:'+(d.getDay()===0||d.getDay()===6?600:400)+';color:'+col+';line-height:13px;z-index:1;';
    cell.textContent=DOWS[d.getDay()];dowR.bar.appendChild(cell);
  });

  // ══ 판매량 ══
  makeSectionHeader('판매량');
  var totR=makeRow(18,'<span style="font-size:10px;font-weight:700;color:var(--ink2)">총판매</span>','background:var(--surface2);border-left:2px solid var(--border2);');
  var totBg=document.createElement('div');totBg.style.cssText='position:absolute;left:0;top:0;width:'+totalW+'px;height:100%;background:var(--surface2);';
  totR.bar.insertBefore(totBg,totR.bar.firstChild);
  dates.forEach(function(d,idx){
    var ds=d.toISOString().slice(0,10),dd=salesByDate[ds],val=dd?dd.total:0;
    if(!val)return;
    var cell=document.createElement('div');
    cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:18px;top:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--ink);z-index:1;';
    cell.textContent=val;totR.bar.appendChild(cell);
  });
  STORES_TL.forEach(function(st){
    var stR=makeRow(16,'<span style="font-size:9px;font-weight:500;color:var(--ink3);padding-left:6px">'+st+'</span>','background:var(--surface2);border-left:2px solid var(--border2);');
    var stBg=document.createElement('div');stBg.style.cssText='position:absolute;left:0;top:0;width:'+totalW+'px;height:100%;background:var(--surface2);';
    stR.bar.insertBefore(stBg,stR.bar.firstChild);
    dates.forEach(function(d,idx){
      var ds=d.toISOString().slice(0,10),dd=salesByDate[ds],val=dd?(dd[st]||0):0;
      if(!val)return;
      var cell=document.createElement('div');
      cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:16px;top:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:400;color:var(--ink2);z-index:1;';
      cell.textContent=val;stR.bar.appendChild(cell);
    });
  });

  // ══ 마케팅 액션 ══
  makeSectionHeader('마케팅 액션');
  var laneGroups={},laneOrder=[];
  actions.forEach(function(a){
    if(a.label&&a.label.startsWith('└'))return;
    if(!laneGroups[a.lane]){laneGroups[a.lane]=[];laneOrder.push(a.lane);}
    laneGroups[a.lane].push(a);
  });

  laneOrder.forEach(function(lane,laneIdx){
    var acts=laneGroups[lane];
    var c=LANE_COLORS[lane]||{bg:'#F5F5F3',text:'#555552',border:'#D0D0CA'};
    if(laneIdx>0) makeDivider();

    var laneRow=addLaneRow(lane,acts,c);

    // 드롭다운 확장 행 삽입 (해당 레인 행 바로 다음)
    acts.forEach(function(a){
      if(a.type!=='expandable') return;
      if(!window.tlExpanded[a.date+a.lane]) return;
      insertExpandedRows(laneRow,a,c);
    });
  });

  // 스크롤 복원 / 초기화
  if(savedScroll>0){
    wrap.scrollLeft=savedScroll;
  } else {
    setTimeout(function(){
      var preStart=new Date(pubDate);preStart.setDate(preStart.getDate()-10);
      var scrollIdx=dates.findIndex(function(d){return d.toDateString()===preStart.toDateString();});
      if(scrollIdx>=0) wrap.scrollLeft=Math.max(0,scrollIdx*CELL_W-4);
    },50);
  }
}

function parseMonthDay(str){
  var parts=str.trim().replace('일','').split('/');
  return new Date(2026, parseInt(parts[0])-1, parseInt(parts[1]));
}
