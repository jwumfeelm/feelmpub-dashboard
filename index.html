}

function renderTimeline(dates, pubDate, today, actions, sales) {
  var CELL_W = 44;
  var LBL_W  = 130;
  var STORES_TL = ["교보","예스24","영풍","알라딘"];
  if(!window.tlExpanded) window.tlExpanded = {};

  var salesByDate = {};
  if (sales) {
    sales.data.forEach(function(row) {
      var total = STORES_TL.reduce(function(s,st){ return s+(row[st]||0); }, 0);
      salesByDate[row.date] = Object.assign({total:total}, row);
    });
  }

  var MO_BG   = ["rgba(26,82,138,.08)","rgba(101,40,170,.07)","rgba(30,122,56,.07)","rgba(0,150,130,.07)","rgba(26,82,138,.09)","rgba(101,40,170,.08)","rgba(176,32,32,.08)","rgba(220,120,0,.07)","rgba(0,150,200,.07)","rgba(180,60,120,.07)","rgba(80,160,80,.07)","rgba(100,100,180,.07)"];
  var MO_TEXT = ["#1A528A","#65287A","#1E7A38","#00785A","#1A528A","#65287A","#901818","#8A4A00","#00628A","#782050","#306830","#3A3878"];

  function wkBg(d){
    var diff=Math.floor((d-pubDate)/86400000);
    if(diff<0) return 'rgba(154,98,16,.05)';
    return Math.floor(diff/7)%2===0?'rgba(0,0,0,.012)':'rgba(0,0,0,.032)';
  }

  var wrap=document.getElementById('tl-wrap');
  if(!wrap) return;
  var savedScroll=wrap.scrollLeft||0;
  wrap.innerHTML='';
  wrap.style.cssText='overflow-x:auto;padding-bottom:8px;';
  var totalW=dates.length*CELL_W;

  // ── inner: 실제 콘텐츠 컨테이너 (relative) ──
  var inner=document.createElement('div');
  inner.style.cssText='position:relative;width:'+(LBL_W+totalW)+'px;';
  wrap.appendChild(inner);

  // ── 배경 레이어: inner 안에 absolute, 높이는 나중에 inner.scrollHeight로 설정 ──
  var bgLayer=document.createElement('div');
  bgLayer.style.cssText='position:absolute;top:0;left:'+LBL_W+'px;width:'+totalW+'px;height:100%;pointer-events:none;z-index:0;display:flex;';
  dates.forEach(function(d,idx){
    var col=document.createElement('div');
    var isWknd=d.getDay()===0||d.getDay()===6;
    col.style.cssText='width:'+CELL_W+'px;flex-shrink:0;height:100%;background:'+wkBg(d)+';box-sizing:border-box;';
    bgLayer.appendChild(col);
  });
  inner.appendChild(bgLayer);

  // wrap 대신 inner에 행을 추가하도록 appendRow 래퍼
  var _origAppend = null; // makeRow가 inner에 append하도록 아래서 처리

  // ── DOM 행 생성 헬퍼 ──
  function makeRow(h, lblHTML, lblStyle, noBg, showDots){
    var row=document.createElement('div');
    row.style.cssText='display:flex;min-height:'+h+'px;position:relative;';
    var lbl=document.createElement('div');
    lbl.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;display:flex;align-items:center;padding:0 8px 0 10px;box-sizing:border-box;overflow:hidden;position:relative;z-index:1;'+(lblStyle||'');
    lbl.innerHTML=lblHTML||'';
    row.appendChild(lbl);
    var bar=document.createElement('div');
    bar.style.cssText='width:'+totalW+'px;flex-shrink:0;position:relative;min-height:'+h+'px;z-index:1;';
    if(showDots){
      dates.forEach(function(d,idx2){
        var isWknd=d.getDay()===0||d.getDay()===6;
        var dot=document.createElement('div');
        dot.style.cssText='position:absolute;left:'+(idx2*CELL_W+CELL_W-1)+'px;top:0;bottom:0;width:1px;border-right:1px dashed rgba(0,0,0,'+(isWknd?'.12':'.06')+');pointer-events:none;z-index:0;';
        bar.appendChild(dot);
      });
    }
    row.appendChild(bar);
    inner.appendChild(row);
    return {lbl:lbl,bar:bar,row:row};
  }
  function makeSectionHeader(text){
    var div=document.createElement('div');
    div.style.cssText='display:flex;height:20px;position:relative;z-index:1;';
    var l=document.createElement('div');
    l.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:var(--surface3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:10px;';
    l.innerHTML='<span style="font-size:9px;font-weight:800;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;">'+text+'</span>';
    div.appendChild(l);
    var r=document.createElement('div');
    r.style.cssText='width:'+totalW+'px;background:var(--surface3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);';
    div.appendChild(r);
    inner.appendChild(div);
  }

  function makeDivider(){
    var div=document.createElement('div');div.style.cssText='display:flex;height:1px;';
    var l=document.createElement('div');l.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:var(--border);';div.appendChild(l);
    var r=document.createElement('div');r.style.cssText='width:'+totalW+'px;background:var(--border);';div.appendChild(r);
    inner.appendChild(div);
  }

  // ── 칩의 날짜 범위 계산 ──
  function getChipRange(a){
    var sDate=new Date(a.date),eDate=new Date(a.date);
    eDate.setDate(eDate.getDate()+(a.days||1)-1);
    var sIdx=dates.findIndex(function(d){return d.toDateString()===sDate.toDateString();});
    var eIdx=dates.findIndex(function(d){return d.toDateString()===eDate.toDateString();});
    if(sIdx<0) return null;
    if(eIdx<0) eIdx=dates.length-1;
    return {sIdx:sIdx, eIdx:eIdx};
  }

  // ── 겹침 방지: 액션 목록을 여러 줄(트랙)로 배분 ──
  function assignTracks(acts){
    var tracks=[]; // tracks[i] = 마지막 eIdx
    var result=acts.map(function(a){
      var range=getChipRange(a);
      if(!range) return {a:a,track:0,range:null};
      // 비어있는 트랙 찾기
      var placed=false;
      for(var t=0;t<tracks.length;t++){
        if(tracks[t]<range.sIdx){ // 겹치지 않음
          tracks[t]=range.eIdx;
          return {a:a,track:t,range:range};
        }
      }
      // 새 트랙
      tracks.push(range.eIdx);
      return {a:a,track:tracks.length-1,range:range};
    });
    return {items:result, trackCount:Math.max(tracks.length,1)};
  }

  // ── 칩 DOM 생성 ──
  function makeChip(bar, a, chipH, rowH, trackH, trackIdx, c, isExpandable){
    var range=getChipRange(a);
    if(!range) return;
    var spanCells=range.eIdx-range.sIdx+1, spanW=spanCells*CELL_W;
    var chipTop=trackIdx*trackH+Math.round((trackH-chipH)/2);

    // 래퍼 div (툴팁 포함)
    var wrap2=document.createElement('div');
    wrap2.className='tl-chip-wrap';
    wrap2.style.cssText=[
      'position:absolute',
      'left:'+(range.sIdx*CELL_W+1)+'px',
      'width:'+(spanW-2)+'px',
      'height:'+chipH+'px',
      'top:'+chipTop+'px',
      'z-index:2',
    ].join(';');

    var chip=document.createElement('div');
    chip.style.cssText=[
      'width:100%','height:100%',
      'background:'+c.bg,
      'border:1.5px solid '+c.border,
      'border-radius:4px',
      'display:flex','align-items:center',
      'overflow:hidden','box-sizing:border-box','cursor:pointer',
    ].join(';');

    // 1일짜리: 도트 + 짧은 라벨, 호버 툴팁
    if(spanCells===1){
      var dot=document.createElement('span');
      dot.style.cssText='width:7px;height:7px;border-radius:50%;background:'+c.border+';flex-shrink:0;margin:0 4px;';
      chip.appendChild(dot);
      // 남은 공간에 텍스트 최대한
      var short=a.label.length>4?a.label.slice(0,4)+'…':a.label;
      var stxt=document.createElement('span');
      stxt.style.cssText='font-size:9px;font-weight:700;color:'+c.text+';white-space:nowrap;overflow:hidden;flex:1;min-width:0;';
      stxt.textContent=short;
      chip.appendChild(stxt);
      // 툴팁 말풍선
      var tip=document.createElement('div');
      tip.className='tl-tooltip';
      tip.textContent=a.label+(a.detail?' — '+a.detail:'')+(a.cost&&a.cost>0?' ('+won(a.cost)+')':'');
      wrap2.appendChild(tip);
    } else {
      var fs=Math.max(9,Math.min(11,Math.floor((spanW-28)/6)));
      var txt=document.createElement('span');
      txt.style.cssText='padding:0 6px;font-size:'+fs+'px;font-weight:700;color:'+c.text+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;flex:1;min-width:0;';
      txt.textContent=a.label;
      chip.appendChild(txt);
      // 멀티데이도 호버 툴팁
      var tip=document.createElement('div');
      tip.className='tl-tooltip';
      tip.textContent=a.label+(a.detail?' — '+a.detail:'')+(a.cost&&a.cost>0?' ('+won(a.cost)+')':'');
      wrap2.appendChild(tip);
    }

    if(isExpandable){
      var arrow=document.createElement('span');
      arrow.style.cssText='font-size:12px;color:'+c.text+';padding:0 8px 0 2px;flex-shrink:0;transition:transform .2s;user-select:none;font-weight:900;';
      arrow.textContent=window.tlExpanded[a.date+a.lane]?'▲':'▼';
      chip.appendChild(arrow);
      chip.addEventListener('click',function(e){
        e.stopPropagation();
        window.tlExpanded[a.date+a.lane]=!window.tlExpanded[a.date+a.lane];
        renderTimeline(dates,pubDate,today,actions,sales);
        setTimeout(function(){wrap.scrollLeft=savedScroll;},10);
      });
    } else {
      chip.addEventListener('click',function(e){
        e.stopPropagation();
        openDetailPanel(a,c);
      });
    }
    wrap2.appendChild(chip);
    bar.appendChild(wrap2);
  }

  // ── 레인 행 추가 (멀티트랙) ──
  function addLaneRow(lane, acts, c, showDots){
    var TRACK_H=32, CHIP_H=26;
    var assigned=assignTracks(acts);
    var numTracks=assigned.trackCount;
    var rowH=numTracks*TRACK_H;

    var r=makeRow(rowH,
      '<span style="font-size:11px;font-weight:700;color:'+c.text+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;display:block">'+lane+'</span>',
      'border-left:3px solid '+c.border+';align-items:flex-start;padding-top:4px;',false,showDots);

    assigned.items.forEach(function(item){
      if(!item.range) return;
      var isExp=item.a.type==='expandable';
      makeChip(r.bar,item.a,CHIP_H,rowH,TRACK_H,item.track,c,isExp);
    });
    return r;
  }

  // ── 날짜 파싱 (7/8 → Date) ──
  function parseMonthDay(str){
    var parts=str.trim().replace('일','').split('/');
    return new Date(2026, parseInt(parts[0])-1, parseInt(parts[1]));
  }

  // ── 소재 드롭다운 행 삽입 (wrap에 직접, 특정 행 뒤에) ──
  function insertExpandedRows(afterRow, a, c){
    if(!a.materials||!a.materials.length) return;
    var phases={},phOrder=[];
    a.materials.forEach(function(m){
      var ph=m.phase||'기타';
      if(!phases[ph]){phases[ph]=[];phOrder.push(ph);}
      phases[ph].push(m);
    });

    // afterRow.row 다음에 삽입
    var anchor=afterRow.row.nextSibling;

    phOrder.forEach(function(ph){
      // 페이즈 헤더
      var phDiv=document.createElement('div');
      phDiv.style.cssText='display:flex;height:16px;';
      var phL=document.createElement('div');
      phL.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:rgba(99,102,241,.06);border-left:3px solid '+c.border+';padding-left:14px;display:flex;align-items:center;box-sizing:border-box;';
      phL.innerHTML='<span style="font-size:10px;font-weight:800;color:#6366F1">'+ph+'</span>';
      phDiv.appendChild(phL);
      var phR=document.createElement('div');
      phR.style.cssText='width:'+totalW+'px;background:rgba(99,102,241,.04);border-top:1px dashed rgba(99,102,241,.2);';
      phDiv.appendChild(phR);
      inner.insertBefore(phDiv,anchor);

      // 소재 칩 행 (겹침 방지)
      var mActs=phases[ph].map(function(m){
        if(!m.days) return null;
        var parts=m.days.split('~');
        var sDt=parseMonthDay(parts[0]),eDt=parseMonthDay(parts[parts.length-1]);
        var sIdx2=dates.findIndex(function(d){return d.toDateString()===sDt.toDateString();});
        var eIdx2=dates.findIndex(function(d){return d.toDateString()===eDt.toDateString();});
        if(sIdx2<0) return null;
        if(eIdx2<0) eIdx2=sIdx2;
        return {m:m, sIdx:sIdx2, eIdx:eIdx2};
      }).filter(Boolean);

      // 트랙 배분
      var mTracks=[];
      var mAssigned=mActs.map(function(item){
        for(var t=0;t<mTracks.length;t++){
          if(mTracks[t]<item.sIdx){mTracks[t]=item.eIdx;return{item:item,track:t};}
        }
        mTracks.push(item.eIdx);
        return{item:item,track:mTracks.length-1};
      });
      var numMTracks=Math.max(mTracks.length,1);
      var MTRACK_H=18,MCHIP_H=13;
      var mRowH=numMTracks*MTRACK_H;

      var subDiv=document.createElement('div');
      subDiv.style.cssText='display:flex;min-height:'+mRowH+'px;';
      var subL=document.createElement('div');
      subL.style.cssText='width:'+LBL_W+'px;min-width:'+LBL_W+'px;flex-shrink:0;background:rgba(99,102,241,.03);border-left:3px solid '+c.border+';padding-left:18px;display:flex;align-items:flex-start;padding-top:3px;box-sizing:border-box;';
      subL.innerHTML='<span style="font-size:9px;font-weight:500;color:var(--ink3)">소재</span>';
      subDiv.appendChild(subL);
      var subR=document.createElement('div');
      subR.style.cssText='width:'+totalW+'px;position:relative;min-height:'+mRowH+'px;background:rgba(99,102,241,.03);';
      dates.forEach(function(d2,idx2){
        var bg2=document.createElement('div');
        bg2.style.cssText='position:absolute;left:'+(idx2*CELL_W)+'px;width:'+CELL_W+'px;top:0;bottom:0;background:'+wkBg(d2)+';';
        subR.appendChild(bg2);
      });

      mAssigned.forEach(function(ma){
        var item=ma.item,m=item.m,t=ma.track;
        var spanCells=item.eIdx-item.sIdx+1,spanW=spanCells*CELL_W;
        var chipTop=t*MTRACK_H+Math.round((MTRACK_H-MCHIP_H)/2);
        var subChip=document.createElement('div');
        subChip.style.cssText=[
          'position:absolute','left:'+(item.sIdx*CELL_W+1)+'px','width:'+(spanW-2)+'px',
          'height:'+MCHIP_H+'px','top:'+chipTop+'px',
          'background:rgba(99,102,241,.12)',
          'border:1px dashed rgba(99,102,241,.5)','border-radius:2px',
          'display:flex','align-items:center','overflow:hidden','z-index:2','cursor:pointer',
        ].join(';');
        subChip.title=m.label+' ('+m.days+')';
        var stxt=document.createElement('span');
        stxt.style.cssText='padding:0 4px;font-size:9px;font-weight:600;color:#6366F1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:'+(spanW-6)+'px;display:block;';
        stxt.textContent=m.label;
        subChip.appendChild(stxt);
        subChip.addEventListener('click',function(e){
          e.stopPropagation();
          openDetailPanel(Object.assign({},a,{label:m.label,detail:m.desc||'',cost:m.cost,date:m.days}),c,m);
        });
        subR.appendChild(subChip);
      });

      subDiv.appendChild(subR);
      inner.insertBefore(subDiv,anchor);
    });
  }

  // ══ 헤더 행들 ══
  var moR=makeRow(18,'','border:none;background:transparent;',true);
  var i=0;
  while(i<dates.length){
    var d=dates[i],mIdx=d.getMonth(),span=1;
    while(i+span<dates.length&&dates[i+span].getMonth()===mIdx)span++;
    var mc=document.createElement('div');
    mc.style.cssText='position:absolute;left:'+(i*CELL_W)+'px;width:'+(span*CELL_W)+'px;height:16px;top:0;background:'+MO_BG[mIdx]+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:'+MO_TEXT[mIdx]+';border-left:1px solid rgba(0,0,0,.08);box-sizing:border-box;';
    mc.textContent=(mIdx+1)+'월';
    moR.bar.appendChild(mc);i+=span;
  }
  var wkR=makeRow(13,'','border:none;background:transparent;',true);
  i=0;
  while(i<dates.length){
    var d=dates[i],diff=Math.floor((d-pubDate)/86400000),isPre=diff<0,wkId=Math.floor(diff/7),span=1;
    if(isPre){while(i+span<dates.length&&Math.floor((dates[i+span]-pubDate)/86400000)<0)span++;}
    else{while(i+span<dates.length){var dd2=Math.floor((dates[i+span]-pubDate)/86400000);if(dd2<0||Math.floor(dd2/7)!==wkId)break;span++;}}
    diff=Math.floor((d-pubDate)/86400000);
    var wc=document.createElement('div');
    wc.style.cssText='position:absolute;left:'+(i*CELL_W)+'px;width:'+(span*CELL_W)+'px;height:13px;top:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-size:9px;color:'+(isPre?'#9A6210':'#AAAAAA')+';white-space:nowrap;overflow:hidden;background:'+wkBg(d)+';';
    wc.textContent=isPre?'예약판매':(Math.floor(diff/7)+1)+'주차';
    wkR.bar.appendChild(wc);i+=span;
  }
  var dtR=makeRow(20,'','border:none;background:transparent;');
  dates.forEach(function(d,idx){
    var isPub2=d.toDateString()===pubDate.toDateString(),isT=d.toDateString()===today.toDateString();
    var cell=document.createElement('div');
    cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:17px;top:0;display:flex;align-items:center;justify-content:center;z-index:1;';
    var num=document.createElement('div');
    if(isPub2)num.style.cssText='background:var(--accent);color:var(--accent-text);border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;';
    else num.style.cssText='font-size:11px;font-weight:'+(isT?800:400)+';color:'+(isT?'var(--bad)':'#BBBBBB')+';';
    num.textContent=d.getDate();
    cell.appendChild(num);dtR.bar.appendChild(cell);
  });
  var DOWS=["일","월","화","수","목","금","토"];
  var dowR=makeRow(15,'','border:none;background:transparent;');
  dates.forEach(function(d,idx){
    var col=d.getDay()===0?'#D0504A':d.getDay()===6?'#6090C0':'#CCCCCC';
    var cell=document.createElement('div');
    cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:13px;top:0;text-align:center;font-size:9px;font-weight:'+(d.getDay()===0||d.getDay()===6?600:400)+';color:'+col+';line-height:15px;z-index:1;';
    cell.textContent=DOWS[d.getDay()];dowR.bar.appendChild(cell);
  });

  // ══ 판매량 ══
  makeSectionHeader('판매량');

  // 누적 합계 계산
  var cumTotal=0, cumByStore={};
  STORES_TL.forEach(function(st){cumByStore[st]=0;});
  Object.values(salesByDate).forEach(function(dd){
    cumTotal+=(dd.total||0);
    STORES_TL.forEach(function(st){cumByStore[st]+=(dd[st]||0);});
  });

  // ── 총판매 행 (라벨 옆에 누적값 인라인) ──
  var totLbl='<div style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 6px 0 0">'
    +'<span style="font-size:10px;font-weight:700;color:var(--ink2)">총판매</span>'
    +'<span style="font-size:10px;font-weight:800;color:var(--good)">'+(cumTotal?cumTotal.toLocaleString()+'부':'0부')+'</span>'
    +'</div>';
  var totR=makeRow(22,totLbl,'border-left:2px solid var(--border2,false,true);padding:0 0 0 10px;background:transparent;',false,true);

  dates.forEach(function(d,idx){
    var ds=d.toISOString().slice(0,10),dd=salesByDate[ds],val=dd?dd.total:0;
    if(!val)return;
    var cell=document.createElement('div');
    cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:22px;top:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--ink);z-index:1;';
    cell.textContent=val;totR.bar.appendChild(cell);
  });

  // ── 서점별 행 (라벨에 누적값 표시) ──
  STORES_TL.forEach(function(st){
    var cum=cumByStore[st];
    var stLbl='<div style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 6px 0 0">'
      +'<span style="font-size:10px;font-weight:500;color:var(--ink3)">'+st+'</span>'
      +'<span style="font-size:9px;font-weight:700;color:var(--ink2)">'+(cum?cum.toLocaleString()+'부':'0부')+'</span>'
      +'</div>';
    var stR=makeRow(20,stLbl,'border-left:2px solid var(--border2,false,true);padding:0 0 0 16px;background:transparent;',false,true);

    dates.forEach(function(d,idx){
      var ds=d.toISOString().slice(0,10),dd=salesByDate[ds],val=dd?(dd[st]||0):0;
      if(!val)return;
      var cell=document.createElement('div');
      cell.style.cssText='position:absolute;left:'+(idx*CELL_W)+'px;width:'+CELL_W+'px;height:20px;top:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:400;color:var(--ink2);z-index:1;';
      cell.textContent=val;stR.bar.appendChild(cell);
    });
  });

  // ══ 마케팅 액션 ══
  makeSectionHeader('마케팅 액션');
  var laneGroups={},laneOrder=[];
  actions.forEach(function(a){
    if(a.label&&a.label.startsWith('└'))return;
    if(!laneGroups[a.lane]){laneGroups[a.lane]=[];laneOrder.push(a.lane);}
    laneGroups[a.lane].push(a);
  });

  laneOrder.forEach(function(lane,laneIdx){
    var acts=laneGroups[lane];
    var c=LANE_COLORS[lane]||{bg:'#F5F5F3',text:'#555552',border:'#D0D0CA'};
    if(laneIdx>0) makeDivider();

    var laneRow=addLaneRow(lane,acts,c,true);

    // 드롭다운 확장 행 삽입 (해당 레인 행 바로 다음)
    acts.forEach(function(a){
      if(a.type!=='expandable') return;
      if(!window.tlExpanded[a.date+a.lane]) return;
      insertExpandedRows(laneRow,a,c);
    });
  });

  // 스크롤 복원 / 초기화
  if(savedScroll>0){
    wrap.scrollLeft=savedScroll;
  } else {
    setTimeout(function(){
      var preStart=new Date(pubDate);preStart.setDate(preStart.getDate()-10);
      var scrollIdx=dates.findIndex(function(d){return d.toDateString()===preStart.toDateString();});
      if(scrollIdx>=0) wrap.scrollLeft=Math.max(0,scrollIdx*CELL_W-4);
    },50);
  }
}

function parseMonthDay(str){
  var parts=str.trim().replace('일','').split('/');
  return new Date(2026, parseInt(parts[0])-1, parseInt(parts[1]));
}

function openDetailPanel(a, c, material){
  // 표시할 소재 목록
  var mats = material ? [material] : (a.materials && a.materials.length ? a.materials : null);

  // 패널 컨테이너: tab-calendar 마지막에 추가 or 기존 패널 재사용
  var panel = document.getElementById('mkt-detail-panel');
  if(!panel){
    panel = document.createElement('div');
    panel.id = 'mkt-detail-panel';
    panel.style.cssText = 'margin-top:14px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-md);';
    document.getElementById('tab-calendar').appendChild(panel);
  }

  var closeBtn = '<button onclick="document.getElementById(\'mkt-detail-panel\').remove()" style="border:none;background:var(--surface3);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink2)">×</button>';

  var matsHTML = '';
  if(mats && mats.length){
    matsHTML = '<div style="display:flex;gap:12px;padding:0 20px 20px;overflow-x:auto;flex-wrap:nowrap;">'
      + mats.map(function(m){
          if(m.type==='youtube'){
            return '<div style="flex-shrink:0;width:280px;background:var(--surface2);border-radius:var(--r2);overflow:hidden;border:1px solid var(--border)">'
              +'<a href="'+m.url+'" target="_blank" style="display:block;position:relative;text-decoration:none">'
              +'<img src="'+m.thumb+'" style="width:100%;height:160px;object-fit:cover;display:block;background:#111">'
              +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">'
              +'<div style="width:48px;height:48px;background:rgba(255,0,0,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">▶</div>'
              +'</div></a>'
              +'<div style="padding:10px 12px"><div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px">'+m.label+'</div>'
              +'<div style="font-size:11px;color:var(--ink3);line-height:1.5">'+m.desc+'</div>'
              +(m.cost?'<div style="font-size:11px;font-weight:700;color:var(--ink2);margin-top:6px">집행 비용: '+won(m.cost)+'</div>':'')
              +'</div></div>';
          } else if(m.type==='image'){
            return '<div style="flex-shrink:0;width:200px;background:var(--surface2);border-radius:var(--r2);overflow:hidden;border:1px solid var(--border)">'
              +'<img src="'+m.img+'" style="width:100%;height:200px;object-fit:cover;display:block;background:var(--surface3)">'
              +'<div style="padding:10px 12px">'
              +'<div style="font-size:11px;font-weight:700;color:var(--ink);margin-bottom:4px">'+m.label+'</div>'
              +'<div style="font-size:10px;color:var(--ink3);line-height:1.5">'+m.desc+'</div>'
              +(m.days?'<div style="font-size:10px;color:var(--ink3);margin-top:4px">기간: '+m.days+'</div>':'')
              +(m.cost?'<div style="font-size:10px;font-weight:700;color:var(--ink2);margin-top:4px">'+won(m.cost)+'</div>':'')
              +'</div></div>';
          } else {
            return '<div style="flex-shrink:0;min-width:240px;max-width:320px;background:var(--surface2);border-radius:var(--r2);padding:14px;border:1px solid var(--border)">'
              +'<div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:8px">'+m.label+'</div>'
              +'<div style="font-size:12px;color:var(--ink2);line-height:1.7">'+m.desc+'</div>'
              +'</div>';
          }
        }).join('')
      +'</div>';
  }

  panel.innerHTML =
    '<div style="padding:16px 20px '+(mats?'8px':'20px')+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">'
    +'<div style="min-width:0">'
    +'<div style="font-size:10px;color:var(--ink3);margin-bottom:3px">'+a.lane+' · '+a.date+(a.days&&a.days>1?' ('+a.days+'일)':'')+'</div>'
    +'<div style="font-size:16px;font-weight:900;color:var(--ink);margin-bottom:4px">'+a.label+'</div>'
    +'<div style="font-size:12px;color:var(--ink3)">'+a.detail+(a.cost&&a.cost>0?' · '+won(a.cost):'')+'</div>'
    +'</div>'+closeBtn+'</div></div>'
    + matsHTML;

  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

}

function renderData(){
  document.getElementById('tab-data').innerHTML=`
    <div class="card gap">
      <div class="card-title">🔗 구글 시트 실시간 연동 설정</div>

        📊 아래 가이드대로 설정하면 구글 시트 저장 시 대시보드가 자동 갱신됩니다 (${CFG.autoRefreshMin}분 간격)
      </div>
      <div style="font-size:13px;line-height:2.2;color:var(--ink2)">
        <b style="color:var(--ink)">1단계</b> &nbsp; 구글 시트를 <b>링크 있는 모든 사용자 → 뷰어</b>로 공유<br>
        <b style="color:var(--ink)">2단계</b> &nbsp; 공유 URL의 <code style="background:var(--surface2);padding:1px 6px;border-radius:3px">/d/<b>[시트ID]</b>/edit</code> 에서 시트ID 복사<br>
        <b style="color:var(--ink)">3단계</b> &nbsp; 대시보드 코드 상단 <code style="background:var(--surface2);padding:1px 6px;border-radius:3px">CFG.sheetId</code>에 붙여넣기<br>
        <b style="color:var(--ink)">4단계</b> &nbsp; 저장 후 새로고침 → 연동 완료
      </div>
    </div>
    <div class="card gap2">
      <div class="card-title">📋 구글 시트 탭 구성</div>
      <table>
        <tr><th>시트 탭</th><th>설명</th><th>입력 주체</th></tr>
        ${[
          ['00_설정','연 목표·비밀번호·전략도서 설정','팀장'],
          ['01_월별실적','월별 출고·반품·비용 입력','팀 전체'],
          ['02_도서기본','도서명·저자·정가·공급가·담당 등','기획팀'],
          ['03_마케팅비용','건별 마케팅 비용 입력 (날짜·도서·항목·금액)','마케팅팀'],
          ['04_출판비용','건별 출판 비용 입력 (인세·제작·외주)','출판팀'],
          ['05_채널실적','채널별 도달·저장·팔로워·수익 입력','IMC파트'],
          ['06_집계(자동)','수식 기반 자동 집계 → 대시보드 소스','(자동)'],
        ].map(([n,d,w])=>`<tr><td><b>${n}</b></td><td style="font-size:12px;color:var(--ink2)">${d}</td><td><span class="badge neutral">${w}</span></td></tr>`).join('')}
      </table>
    </div>`;
}

/* ─────────────────────────────────────
   DRAWER — 도서 상세
───────────────────────────────────── */
function openDrawer(id){
  const b=BOOKS.find(x=>x.id===id);
  if(!b) return;
  const cumCost=b.cumMktCost+b.cumPubCost+b.cumComCost;
  const profit=b.cumSalesPub-cumCost;
  const roas=b.cumMktCost?Math.round(b.cumSalesPub/b.cumMktCost*100):0;
  const roi =cumCost?Math.round(b.cumSalesPub/cumCost*100):0;
  const bxp=EXPENSES.filter(e=>e.bookId===id);

  // 마케팅비 내역 차트
  const mktEntries=Object.entries(b.mktBreak||{});
  const mktMax=Math.max(...mktEntries.map(([,v])=>v),1);
  const mktColors={meta:'#0866FF',google:'#EA4335',tiktok:'#000',store:'#FDE200',etc:'#9A9A96'};
  const mktLabels={meta:'메타',google:'구글',tiktok:'틱톡',store:'서점',etc:'기타'};

  document.getElementById('overlay').classList.add('open');
  const drawer=document.getElementById('drawer');
  drawer.classList.add('open');
  drawer.innerHTML=`
    <!-- 헤더 -->
    <div class="drawer-hdr">
      <div>
        <div style="font-size:10px;color:var(--ink3);margin-bottom:4px">${b.genre} · ${b.isbn} · 출간 ${b.pubDate}</div>
        <div style="font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-.02em">${esc(b.title)}</div>
        <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
          <span class="badge neutral">정가 ${b.price.toLocaleString()}원</span>
          <span class="badge neutral">공급가 ${b.supply.toLocaleString()}원</span>
          <span class="badge ${b.field==='IMC1'?'acc':b.field==='IMC2'?'info':'good'}">${b.field}</span>
          <span class="badge neutral">마케터 ${esc(b.mkt)}</span>

          <span class="badge ${profit>=0?'good':'bad'}">${profit>=0?'흑자':'적자'}</span>
        </div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-cover" style="background:${b.cover}"><div><div style="font-size:16px;font-weight:900;margin-bottom:5px">${esc(b.title)}</div></div></div>

    <!-- 상단: 기본 정보 -->
    <div class="sec-label">도서 기본 정보</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
      ${[['정가',b.price.toLocaleString()+'원'],['공급가',b.supply.toLocaleString()+'원'],['담당',b.field],['기획자',b.edit],['마케터',b.mkt],['출간일',b.pubDate]].map(([l,v])=>`
        <div style="background:var(--surface2);border-radius:var(--r3);padding:8px 10px">
          <div style="font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">${l}</div>
          <div style="font-size:13px;font-weight:700;color:var(--ink)">${v}</div>
        </div>`).join('')}
    </div>

    <!-- 중단: 누적 출고·판매 -->
    <div class="sec-label">누적 출고 · 판매 실적</div>
    <div class="g2e" style="margin-bottom:12px">
      <div class="card">
        <div class="card-title">출고 실적</div>
        <table>
          <tr><td style="color:var(--ink2);font-size:12px">누적 출고 부수</td><td class="right"><b>${b.cumShipQty.toLocaleString()}부</b></td></tr>
          <tr><td style="color:var(--ink2);font-size:12px">누적 출고 매출</td><td class="right"><b>${won(b.cumShipAmt)}</b></td></tr>
          <tr><td style="color:var(--ink2);font-size:12px">당월 출고 부수</td><td class="right">${b.mShipQty.toLocaleString()}부</td></tr>
          <tr><td style="color:var(--ink2);font-size:12px">당월 반품 부수</td><td class="right">${b.mReturn.toLocaleString()}부</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-title">판매 실적 (SCM)</div>
        <table>
          <tr><td style="color:var(--ink2);font-size:12px">누적 판매 부수</td><td class="right"><b>${b.cumSalesQty.toLocaleString()}부</b></td></tr>
          <tr><td style="color:var(--ink2);font-size:12px">누적 판매액</td><td class="right"><b>${won(b.cumSalesPub)}</b></td></tr>
          ${Object.entries(b.stores||{}).map(([k,v])=>{const labels={kyobo:'교보문고',yes:'예스24',aladin:'알라딘',naver:'네이버',others:'기타'};return `<tr><td style="color:var(--ink3);font-size:11px">└ ${labels[k]||k}</td><td class="right" style="font-size:12px">${v.toLocaleString()}부</td></tr>`}).join('')}
        </table>
      </div>
    </div>

    <!-- 누적 마케팅비 + ROAS -->
    <div class="sec-label">누적 마케팅 비용</div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">마케팅비 내역 <small>누적 총 ${won(b.cumMktCost)} · ROAS ${roas}%</small></div>
      ${mktEntries.map(([k,v])=>`<div class="prog-item">
        <div class="prog-head"><b>${mktLabels[k]||k}</b><span>${won(v)} · ${pct(v,b.cumMktCost)}%</span></div>
        <div class="prog-bg"><div class="prog-fill" style="width:${pct(v,mktMax)}%;background:${mktColors[k]||'#ccc'}"></div></div>
      </div>`).join('')}
    </div>

    <!-- 누적 비용 상세 -->
    <div class="sec-label">누적 비용 상세</div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">월별 누적 비용 <small>마케팅비 / 인세 / 제작비 / 외주 등</small></div>
      <table>
        <tr><th>항목</th><th class="right">금액</th><th class="right">비중</th></tr>
        ${[['마케팅비',b.cumMktCost],['출판비(인세·제작·외주)',b.cumPubCost],['공통비(물류 등)',b.cumComCost]].map(([l,v])=>`
          <tr><td>${l}</td><td class="right">${won(v)}</td><td class="right">${pct(v,cumCost)}%</td></tr>`).join('')}
        <tr style="background:var(--surface2)"><td><b>합계</b></td><td class="right"><b>${won(cumCost)}</b></td><td class="right"><b>100%</b></td></tr>
      </table>
      ${bxp.length?`<div style="margin-top:10px"><div style="font-size:10px;color:var(--ink3);font-weight:800;margin-bottom:6px">비용 원장 (건별)</div>
        <table><tr><th>날짜</th><th>팀</th><th>항목</th><th>세부</th><th class="right">금액</th></tr>
        ${bxp.map(e=>`<tr><td style="font-size:10px;color:var(--ink3)">${e.date}</td><td><span class="badge neutral" style="font-size:9px">${e.team}</span></td><td style="font-size:12px">${e.type}</td><td style="font-size:11px;color:var(--ink3)">${e.sub}</td><td class="right">${won(e.amount)}</td></tr>`).join('')}
        </table></div>`:''}
    </div>

    <!-- 최종 손익 -->
    <div class="sec-label">최종 손익 현황</div>
    <div class="card">
      <div class="card-title">손익 요약</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
        ${[['누적 판매액',b.cumSalesPub,''],['누적 총 비용',cumCost,''],['ROAS',roas+'%',''],['ROI',roi+'%','']].map(([l,v,hint])=>`
          <div style="text-align:center;background:var(--surface2);border-radius:var(--r3);padding:10px 6px">
            <div style="font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${l}</div>
            <div style="font-size:16px;font-weight:900;color:var(--ink)">${typeof v==='number'?won(v):v}</div>
          </div>`).join('')}
      </div>
      <div style="padding:14px;border-radius:var(--r2);background:${profit>=0?'var(--good-dim)':'var(--bad-dim)'};border:1px solid ${profit>=0?'rgba(30,122,56,.2)':'rgba(176,32,32,.2)'};text-align:center">
        <div style="font-size:10px;color:${profit>=0?'var(--good)':'var(--bad)'};font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">최종 손익</div>
        <div style="font-size:28px;font-weight:900;color:${profit>=0?'var(--good)':'var(--bad)'}">${profit>=0?'+':''}${won(profit)}</div>
      </div>
    </div>`;

}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function toggleFullscreen() {
  const btn = document.getElementById('fsBtn');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().then(() => {
      btn.innerHTML = '✕ 전체화면 종료';
      const el = document.getElementById('trend-chart');
      if (el) el._animated = false;
      renderPills();
    });
  } else {
    document.exitFullscreen().then(() => {
      btn.innerHTML = '⛶ 전체화면';
    });
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fsBtn');
  if (btn) btn.innerHTML = document.fullscreenElement ? '✕ 전체화면 종료' : '⛶ 전체화면';
});
</script>
</body>
</html>
